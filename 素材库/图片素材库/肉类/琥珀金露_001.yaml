content_description: 精选优质香肠经炭火炙烤至表皮金黄油亮，呈现诱人琥珀色泽，肠衣微焦带脆。搭配丝滑金黄色芥末酱，点缀以黑白腌制珍珠洋葱提味，盘底轻淋透明油脂，撒少许现磨黑胡椒，以极简主义呈现肉类本真风味，适合佐酒慢享。
dish_arrangement:
  plate: 白色哑光陶瓷圆盘，浅边沿设计，直径约24cm，材质温润不反光
  logic: 对角线构图法则，香肠沿右上方45度角放置形成视觉主轴，酱料与配料在左下方形成三角平衡，引导视线从主食材向配饰流动
  spacing: 主食材与配菜保持3-4cm呼吸间距，既分离又通过油痕形成隐性连接，避免视觉拥挤
  decoration: 极简装饰法则，以现磨黑胡椒碎作为点状肌理装饰，5-6颗黑白腌制洋葱作为色彩对比点集中分布于左下，黄色酱料作为色块点缀
  negative_space: 大面积留白艺术，约占盘面60%面积，集中于左侧及底部区域，营造高级感与呼吸感，突出主食材的孤独美学
  overall_style: 现代北欧Bistro风格，对标Osteria Francescana等简约主义餐厅，适合casual fine dining场景，强调食材本味与视觉纯净度
