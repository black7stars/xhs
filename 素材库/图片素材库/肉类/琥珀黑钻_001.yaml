content_description: 金黄酥脆的炸肉丸置于绵密橙色泥酱之上，搭配两块缀以珍贵黑鱼子酱的脆烤吐司，点缀晶莹剔透的腌渍樱桃番茄与新鲜豌豆苗，呈现丰富的质地层次与奢华的味觉对比。
dish_arrangement:
  plate: 纯白哑光陶瓷圆盘，宽边设计，直径约28cm，极简无边沿设计突出食物色彩
  logic: 对角线构图法则，从左上鱼子酱吐司至右下炸物球形成视觉引导线，炸物球作为视觉焦点置于黄金分割点
  spacing: 元素间保持1.5-2cm精准间距，炸物与吐司呈45度角呼应，既独立成章又形成整体
  decoration: 单支豌豆苗曲线点缀于炸物前方，两粒鱼子酱对称分布于吐司块上形成节奏感，腌渍番茄作为色彩过渡点
  negative_space: 左侧及上方保留60%留白，形成呼吸感，突出菜品的精致分量与高端定位
  overall_style: 现代欧式Bistro精致风格，对标米其林指南入选餐厅标准，适合商务宴请或精致 casual dining 场景
