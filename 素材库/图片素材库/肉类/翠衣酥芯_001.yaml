- 绯红色
- 翠绿色
- 琥珀色
composition: 45度斜俯拍
food_presentation_style: 现代极简动态摆盘，酱汁倾倒瞬间捕捉
season: 全年
lighting: 冷光
content_description: 酥皮包裹的牛排切面呈现诱人的粉红色五分熟状态，外层覆盖翠绿香草酥壳，配以清脆的西兰花苗。琥珀色肉汁正从银质酱汁船倾泻而下，在纯白盘面上形成流动的酱汁池，点缀以青豆泥，整体呈现现代Bistro的精致质感。
dish_arrangement:
  plate: 纯白哑光陶瓷圆盘，无边沿设计，直径约28cm
  logic: 中心构图法则，牛排置于视觉中心偏左形成锚点，酱汁从右上至左下形成对角线动态流，两株西兰花苗呈不对称三角分布平衡画面重量
  spacing: 主料与配菜保持2-3cm呼吸间距，酱汁池部分覆盖牛排底部形成连接，青豆泥点缀于左右两侧形成视觉对称
  decoration: 极简装饰法则，两团青豆泥呈水滴状分布于4点和8点位置，西兰花苗作为天然色彩装饰仅取两株，避免喧宾夺主
  negative_space: 大面积留白集中于左下及右侧区域，占比约60%，纯白背景突出食材色彩层次，营造高端餐厅的呼吸感与高级感
  overall_style: 现代欧式Bistro风格，对标米其林指南入选餐厅，强调食材本味与精致呈现，适合商务晚餐或纪念日约会场景
