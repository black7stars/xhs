content_description: 精选德式香草香肠经炭火炙烤至表皮金黄微焦，肉汁丰盈，夹入手工全麦杂粮面包中，内衬腌制紫甘蓝丝增添爽脆口感与明艳色彩。手持呈现方式突出食物的温度感与亲和力，适合作为Bistro的休闲轻食或佐酒小点。
dish_arrangement:
  plate: 无传统餐盘，采用手持展示（Hand-held Presentation），以人手作为动态载体，背景为纯色哑光墙面，突出食物主体与临场感
  logic: 对角线构图法则，香肠与面包形成45度倾斜角度，引导视线从左上至右下流动；紫甘蓝从缝隙中探出，形成色彩对比焦点与视觉锚点
  spacing: 紧凑式填充，香肠与面包贴合紧密，紫甘蓝适量填充缝隙，整体呈饱满状态，体现丰盛感与手持食物的满足感
  decoration: 零装饰法则（No Garnish Philosophy），完全依靠食材本身色彩对比（紫与金）和质感差异（光滑香肠/粗糙面包/丝状甘蓝）构成视觉层次
  negative_space: 背景大面积留白（约70%画面），纯色墙面无干扰，突出手持食物的亲近感与仪式感；手部仅占画面下方30%，形成稳定支撑视觉而不喧宾夺主
  overall_style: 北欧极简主义与德式街头美食的融合，对标现代都市Bistro的 Casual Fine Dining 风格，强调食材本真与手工质感，适合Instagram传播的社交属性摆盘
