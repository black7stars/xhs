dish_arrangement:
  plate: 粗陶质地，手绘放射状条纹装饰，圆形浅盘，直径约28cm，边缘保留粗粝的自然釉色
  logic: 中心对称构图，鸡腿X形交叉摆放形成视觉锚点，放射线条从中心向外扩散引导视线聚焦
  spacing: 食物占据盘面中心70%区域，酥皮边缘与盘沿保持3cm均匀间距
  decoration: 石榴籽以不规则点状散布（约18-22颗），香草碎线性点缀于鸡腿表面，形成点线面视觉层次
  negative_space: 放射状条纹盘面形成天然留白分区，边缘环形留白平衡食物厚重感，提升呼吸感
  overall_style: 现代Bistro家庭分享式，对标Ottolenghi风格，适合秋季周末晚餐场景
