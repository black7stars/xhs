content_description: 酥皮金黄酥脆呈圆形铺底，两只烤至表皮焦香的鸡腿交叉摆放形成视觉中心，表面点缀晶莹剔透的石榴籽与新鲜香草碎，底部隐约可见焦糖洋葱馅料，配以
