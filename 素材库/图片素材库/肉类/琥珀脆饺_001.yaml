season: 全年
lighting: 暖光侧逆光
content_description: 金黄焦脆的煎饺堆叠于深色系器皿中，表面呈现完美的焦糖化色泽，撒上绯红色香料粉末增添视觉层次。热油滴落的瞬间被定格，在暖光下折射出诱人光泽，外皮的酥脆质感与内馅的丰腴形成对比，呈现融合Bistro对经典亚洲小吃的现代诠释。
dish_arrangement:
  plate: 哑光黑陶瓷深盘，圆形，无边沿设计，直径约18-20cm，深色背景最大化衬托食物暖色调
  logic: 金字塔式堆叠构图，三只煎饺交错叠放形成纵向层次，视觉重心位于画面黄金分割点，油滴下落轨迹引导视线从上至下流动
  spacing: 紧密堆叠策略，饺子间保持0.5-1cm轻微重叠，既展现份量感又保留个体轮廓，底部饺子部分隐于阴影中增加深度
  decoration: 红色细粉末（甜椒粉或辣椒粉）均匀筛撒于表面形成色彩对比，动态油滴作为'活装饰'打破静态画面，数量控制在单滴下落瞬间，营造刚出锅的温度感
  negative_space: 深色盘面占据画面60%以上形成负空间，集中于四周及上方区域，突出主体煎饺的琥珀色泽；顶部预留空间配合油滴动态，避免画面拥挤
  overall_style: 现代暗黑系Bistro风格，对标Soho区亚洲融合小酒馆，强调食材的原始质感与烹饪痕迹，适合夜间菜单拍摄，营造温暖而精致的街头美食高级感
