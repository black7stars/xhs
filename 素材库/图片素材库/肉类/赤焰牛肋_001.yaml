season: 全年
lighting: 自然光
content_description: 精选牛肋排经低温慢烤后高温焦化，表面形成深邃焦糖壳，切面呈现完美粉红色肌理；搭配丝滑土豆泥与微酸蔬菜丁平衡油脂；深红酒酱汁以艺术弧线铺陈盘底，形成强烈的色彩对比；顶部点缀翠绿细香葱碎，增添清新层次与视觉焦点。
dish_arrangement:
  plate: 白色哑光陶瓷圆盘，宽边浅底设计，直径约28cm，无边沿装饰，突出食材色彩
  logic: 对角线构图法则，牛排置于右上象限，土豆泥置于左下象限，形成视觉对角平衡；酱汁作为流动元素连接两者，引导视线从右向左自然流动
  spacing: 主食材间距控制在3cm左右，保持独立性的同时通过酱汁形成关联；牛排与盘边保留5cm以上距离，营造悬浮感
  decoration: 极简直给式装饰，仅使用细切香草碎（约5g）集中于土豆泥顶部，搭配brunoise切法的蔬菜丁（番茄/洋葱），形成色彩跳脱与质地对比，数量控制在精而不多
  negative_space: 盘面留白约75%，集中在左侧及下方区域，形成强烈的负形空间，突出主食材的珍贵感，符合现代高级餐饮的呼吸美学
  overall_style: 现代北欧Bistro风格，对标Noma或Septime的极简自然美学，强调食材本真与精准技法，适合高端休闲晚餐场景
