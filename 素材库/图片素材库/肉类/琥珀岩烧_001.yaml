content_description: 精选伊比利亚黑猪五花经低温慢煮后高温炭烤，表面刷以黑糖味噌酱形成晶莹琥珀脆壳。顶部点缀松露蒜香泡沫，撒上海盐与现磨黑胡椒，置于深色木质托盘，以新鲜香草叶点缀，呈现肉质层次与焦糖化美拉德反应的完美结合。
dish_arrangement:
  plate: 深色胡桃木托盘，长方形，边沿低矮微翘，天然木纹增添质朴质感
  logic: 对角线构图，主食材从左下向右上延伸，利用肉质纹理引导视线流动，泡沫形成横向分割线平衡画面
  spacing: 食材占据盘面约55%，前后保留3cm呼吸空间，避免拥挤感
  decoration: 减法装饰法则，仅使用1-2片新鲜香菜叶点缀右侧，白色泡沫以不规则涂抹方式呈现，数量控制在3-4处，形成色彩对比而不喧宾夺主
  negative_space: 右上方大面积留白，占比约40%，突出主物质感并营造高端呼吸感；左下角保留木质纹理可见，强化自然质朴氛围
  overall_style: 现代北欧Bistro风格，对标Noma简约美学，适合精致晚餐场景，强调食材本真与手工质感
