content_description: 酥皮烤鸡胸呈现完美琥珀色泽，切面露出嫩滑肉质；搭配翡翠色蔬菜球与双色酱汁点缀，背景以铸铁锅烤鸡与春季沙拉衬托，整体构图如春日田野般清新雅致，展现法式酥皮工艺与现代极简美学的融合。
dish_arrangement:
  plate: 哑光白色陶瓷浅盘，圆形宽边设计，直径约28cm，低边沿设计突出食材悬浮感
  logic: 采用黄金三角形构图，酥皮鸡（左下）-蔬菜球（右中）-酱汁群（中下）形成稳定视觉三角，视线由酥皮纹理自然流向绿色点缀
  spacing: 元素间距控制在4-5cm，主食材占据盘面40%区域，避免拥挤感，符合高端餐饮呼吸感标准
  decoration: 分子料理滴酱技法（白色奶油酱圆形+绿色香草酱水滴形），微量海盐/香料粉撒落（3-4处），以少胜多，强化精致感
  negative_space: 右上方保留60%空白区域，形成视觉留白，突出主食材的雕塑感，同时与背景黑色锅具形成虚实对比
  overall_style: 北欧极简主义融合现代法式Bistro，对标Noma/Osteria Francescana风格，适合人均300-500元的高端休闲餐饮场景，强调食材本真与季节感
