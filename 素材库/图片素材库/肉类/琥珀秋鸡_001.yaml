content_description: 精选春鸡经高温烤制，表皮呈现诱人的琥珀金黄色泽，肉质鲜嫩多汁。搭配煎制野生菌菇，点缀新鲜迷迭香，置于蓝灰色裂纹釉盘中，呈现现代Bistro的精致乡村美学。
dish_arrangement:
  plate: 陶瓷材质，圆形浅盘，宽边沿设计，蓝灰色裂纹釉（Craquelure）表面，直径约26cm
  logic: 中心垂直堆叠构图，采用'高山'摆盘法，鸡肉块交错叠放形成视觉高度，菌菇分布底部作为基座，引导视线由下至上游走
  spacing: 紧凑式布局，食材间距控制在1-2cm，保持整体感与温度，同时通过层次区分不同部位
  decoration: 新鲜迷迭香作为芳香装饰，共3-4支，策略性插置于鸡肉缝隙间，既增添色彩对比又暗示风味层次；无过度装饰，遵循'食材即装饰'原则
  negative_space: 盘子边缘保留约60%留白，蓝灰色裂纹盘面作为'画布'衬托主食材，左侧和下方留白较多，形成视觉呼吸感，突出中心主体
  overall_style: 现代欧式Bistro风格，融合Rustic Chic（精致乡村）与New Nordic美学，对标Septime或Brat等伦敦/巴黎热门Bistro，适合
    casual fine dining 晚餐场景
