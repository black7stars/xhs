food_presentation_style: 解构式 rustic elegance 风格，威灵顿切片展示内部层次结构，搭配野生菌菇与新鲜香草，营造精致随性的视觉叙事
season: 秋冬
lighting: 暖光
content_description: 经典威灵顿牛肉的现代演绎，酥皮金黄酥脆呈琥珀色泽，切面粉嫩五分熟牛肉芯呈现诱人绯红，夹层蘑菇酱香气浓郁。搭配烤金针菇、褐菇及新鲜百里香，以质朴优雅的摆盘方式呈现英式料理的精致感。
dish_arrangement:
  plate: 浅灰色粗陶盘，圆形，直径约28-30cm，哑光质感带细微颗粒纹理，宽边沿设计
  logic: 对角线构图法则，完整威灵顿置于画面上半部，切片展示截面置于下半部形成视觉锚点，菌菇与香草沿对角线自然散落，引导视线从酥皮纹理流向粉嫩肉质
  spacing: 主食材间保持1-2cm呼吸间隙，切片与整体分离摆放避免拥挤，配菜以'三角散布'方式环绕，形成动态平衡
  decoration: 新鲜百里香枝条作为线性装饰（2-3枝），烤野菌（金针菇、褐菇切片）作为有机质地点缀（6-8朵），遵循'奇数法则'不对称分布，增添森林野趣与大地质感
  negative_space: 盘子右侧及边缘保留30%留白，浅灰色盘面作为视觉缓冲，突出威灵顿的暖色调与层次结构，营造高级呼吸感
  overall_style: 现代Bistro风格，对标The Ledbury或Locanda Locatelli等高端休闲餐厅，强调手工质感与食材本真，适合秋季晚餐的温馨奢华场景
