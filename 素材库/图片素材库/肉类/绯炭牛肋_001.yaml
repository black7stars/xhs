content_description: 精选牛肋排经长时间慢炖后表面炭烤，呈现焦香外壳与柔嫩内里，搭配丝滑甜菜根泥形成绯色基底，点缀烤制菌菇或辣椒增添层次。置于纯白哑光瓷盘之上，背景以干辣椒放射状烘托暖意，整体呈现极简而有力量的视觉美学，口感浓郁丰富，适合秋冬季节享用。
dish_arrangement:
  plate: 哑光质感纯白陶瓷盘，圆形，大直径（约28-30cm），无边沿装饰，平底微凹，呈现日式极简与斯堪的纳维亚风格融合
  logic: 非对称偏左构图，遵循黄金分割比例（约1:1.618），酱汁圆形铺底形成视觉锚点，主食材斜向堆叠营造动态平衡，从左上向右下形成视觉流动，强调纵向层次而非横向铺陈
  spacing: 食材紧密堆叠于盘子左侧1/3区域，间距小于0.5cm营造整体感，与盘边保持5cm以上距离，形成宽敞舒适的呼吸空间
  decoration: 采用'盘外装饰'手法，干辣椒围绕盘子呈放射状自然散落（数量8-12个），营造热烈氛围与季节感；盘内零装饰，依靠食材本身质感（肉类的焦褐、酱汁的光泽、配菜的自然弯曲）形成视觉焦点
  negative_space: 右侧及下方约75%盘面留白，形成强烈的虚实对比，留白区域干净无点缀，强化主食材的雕塑感和珍贵性，符合高级料理'少即是多'的哲学，引导视线集中于食物本身
  overall_style: 新北欧料理（New Nordic Cuisine）与现代Bistro融合风格，对标Geranium或Noma的极简主义，适合高端晚餐场景，强调食材本真、手工质感、季节性表达和火焰炭烤的原始魅力
