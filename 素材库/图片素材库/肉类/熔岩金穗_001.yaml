content_description: 手工芝麻脆皮面包经热压烘烤至金黄酥脆，表面密布芝麻如金穗般闪耀。切面对角展露融化的芝士与意式火腿层层交叠，隐约可见烤红椒点缀其间。顶部以青橄榄与香草牙签装饰，配以金属杯装特调蘸酱，呈现经典与现代的融合美学。
dish_arrangement:
  plate: 白色陶瓷浅盘，不规则有机椭圆造型，边缘手绘黑色流线描边，哑光质感，直径约22cm
  logic: 对角线构图法则，两块三明治呈45度角倾斜摆放形成视觉引导线，从左上橄榄装饰向右下酱汁杯形成Z字形视觉流动，利用高度差（立放与平放）创造立体层次
  spacing: 两块三明治间距控制在1.5cm形成呼应关系，与酱汁杯保持2cm功能间距，整体摆盘偏离中心偏下三分之一处，营造随性而不失精致的松弛感
  decoration: 极简装饰法则，单颗青橄榄作为视觉锚点固定于上方三明治顶部，搭配微型香草牙签（1支），遵循奇数原则与少即是多的美学，避免过度装饰掩盖食材本身质感
  negative_space: 盘子四周保留充足留白，特别是底部与左侧区域留白占比约45%，形成呼吸感；白色盘面与深色酱汁、金黄面包形成强烈色彩对比，留白区域平衡了芝麻面包的密集纹理
  overall_style: 现代都市Bistro风格，对标All Day Dining餐厅早午餐场景，融合美式 diner 的随性与法式餐点的精致，适合 casual
    dining 场景，强调食材的诚实表达与手工质感
