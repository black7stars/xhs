- 墨绿
composition: 45度斜俯拍
food_presentation_style: 现代法式乡村风格，色彩对比鲜明，层次丰富
season: 秋
lighting: 自然光
content_description: 金黄酥脆的鸭腿立于盘中，表皮泛着琥珀光泽，肉质酥烂。底部铺垫新鲜的芝麻菜，点缀以鲜橙片与红菜头块，色彩明艳。珍珠洋葱浸润在浓郁的肉汁中，整体呈现温暖的秋日色调，口感层次丰富，视觉与味觉的双重享受。
dish_arrangement:
  plate: 白色陶瓷深盘，圆形宽边设计，直径约24-26cm，中等深度以容纳酱汁，哑光质感突出食物色彩
  logic: 采用'山峰式'构图法则，鸭腿作为视觉主峰斜向矗立（从左上至右下），形成对角线视觉引导；配菜紧密环绕底部，构建色彩层次基底，酱汁自然流淌增加动感
  spacing: 主食材占据盘面视觉中心60%区域，配菜与主菜保持0.5-1cm的呼吸间距，避免拥挤；酱汁沿盘底自然铺展，不覆盖全部盘面
  decoration: 以新鲜芝麻菜作为绿色基底铺陈，柑橘片与甜菜根块作为色彩点缀（约5-6块，分布遵循三角法则），珍珠洋葱（3-4颗）作为圆形元素点缀于酱汁中，平衡视觉节奏
  negative_space: 盘沿四周保留约35-40%的白色留白，集中于左侧及上方区域，形成'画框式'视觉效果，突出主食材立体感，营造呼吸感与高级感
  overall_style: 现代法式Bistro风格（Modern French Rustic），精致中带有随性自然，对标巴黎左岸小酒馆，适合秋季晚餐场景，呈现温暖质朴的优雅
