content_description: 整只春鸡经慢烤至表皮金黄酥脆，淋以浓缩琥珀色肉汁，呈现诱人光泽。搭配焦糖化时令根菜与新鲜香草点缀，置于手工粗陶盘中，展现质朴而精致的乡村法式风情。肉质鲜嫩多汁，酱汁浓郁回甘，呈现经典Bistro料理的温暖质感。
dish_arrangement:
  plate: 手工粗陶材质，浅盘设计，不规则波浪边沿，米白色底色带灰色斑点纹理，直径约28cm
  logic: 非对称平衡构图，烤鸡主体置于左侧黄金分割点，配菜簇状分布于右侧，酱汁自然流淌形成视觉引导线，从左至右营造动态流动感
  spacing: 主菜与配菜保持1-2cm亲密间距，通过酱汁连接形成整体；食材与盘边保留3cm呼吸空间，避免拥挤
  decoration: 新鲜欧芹叶点缀于根菜之上，共3处绿色焦点，呈三角形分布；香草碎均匀撒于胡萝卜表面增加纹理层次
  negative_space: 左下及上方区域留白约35%，以纯净盘面衬托主菜色泽，强化视觉焦点，营造高端Bistro的简约高级感
  overall_style: 现代乡村法式Bistro风格，对标巴黎玛黑区精品小酒馆，适合 casual fine dining 场景，强调手作温度与食材本味
