content_description: 三只开放式三明治呈品字形布局于深绿方盘。底部为杂籽多谷物面包，承托金黄酥脆的炸鸡排，其上点缀翠绿蒜苔，顶部覆盖经喷枪炙烤的切达芝士，表面呈现美拉德焦斑。整体色彩对比强烈，层次立体，呈现粗犷而精致的美式
  Bistro 风格。
dish_arrangement:
  plate: 深绿色哑光陶瓷方盘，边角微弧，边沿轻翘，尺寸约22cm，粗陶质感呼应食材的质朴
  logic: 品字形三角构图，前单后双形成视觉纵深感；焦点落于前景三明治，利用浅景深引导视线由前向后流动，符合'近大远小'的透视美学
  spacing: 三只主体间距控制在1.5cm，既保持个体独立性又形成整体聚合感；垂直方向层层堆叠约5cm高度，营造立体'山丘'形态
  decoration: 零额外装饰法则，以食材本身为视觉元素——芝士的焦褐斑点作为'装饰性焦化'，翠绿蔬菜提供色彩隔断，实现'食材即装饰'的高级感
  negative_space: 盘子四周保留40%留白，左右两侧及前方留白尤为充分，突出主体；背景通过浅景深虚化（围裙），压缩空间聚焦菜品本身
  overall_style: 现代美式Bistro风格，粗犷精致主义，对标The Commune Social或Egg Slut等高端休闲餐厅，适合周末Brunch或轻午餐场景，强调手工感与舒适度
