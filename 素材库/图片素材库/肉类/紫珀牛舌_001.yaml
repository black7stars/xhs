content_description: 精选牛舌慢炖至软糯后高温煎制，表面呈现琥珀焦香色泽，一侧包裹炭烤紫甘蓝叶，顶部点缀爆裂芥末籽增添视觉与味觉层次。盘右下绯红甜菜根丝缠绕成团，覆以酢浆草嫩芽，左下配以甜菜根凝露，酱汁如溪流般沿盘自然流淌，构筑秋季深沉浓郁的紫色基调与温润质感对比。
dish_arrangement:
  plate: 粗陶质感宽边浅盘，圆形，米白色釉面配土黄色裸烧边沿，直径约28-30cm， rustic质感中和菜品精致度
  logic: 采用对角线动态构图，主菜置于左上至中心区域呈15度倾斜，酱汁向右下流淌形成视觉引导线，右下配菜团块平衡重心，形成从左至右的视觉流动
  spacing: 主配菜间保持3-4cm呼吸间距，避免食材直接接触以保持独立性，通过酱汁自然连接各元素，形成有机整体
  decoration: 黄色芥末籽作为点状装饰随机散布于肉片表面（约25-30粒），紫色酢浆草三叶状点缀于甜菜根丝上（3-4朵），遵循奇数法则与不对称分布，增添自然野趣
  negative_space: 盘面约60%留白集中于左侧与上部，形成大面积负空间，突出主体食材的精致感与高级感，避免视觉拥挤
  overall_style: 现代北欧Bistro风格，对标哥本哈根Relæ或Amass美学，强调食材本味、手工质感与季节性，适合高端休闲正餐场景，呈现精致而不失温度的用餐体验
