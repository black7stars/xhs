content_description: 经慢火细炖的鸭腿呈现诱人焦糖色泽，表面覆盖浓稠闪亮的琥珀色酱汁。搭配丝滑土豆泥与新鲜香草点缀，深褐色浓缩酱汁与翠绿色香草油在盘底形成优雅对比，呈现经典Bistro的温馨质感与精致细节。
dish_arrangement:
  plate: 白色哑光陶瓷盘，圆形浅边设计，直径约26-28cm，宽边沿提供充足留白空间
  logic: 不对称三角构图，鸭腿骨指向1点钟方向形成视觉延伸线，土豆泥置于左侧平衡重量，酱汁从底部向右上方流动形成视觉引导
  spacing: 主食材与配菜保持0.5-1cm微距接触，既体现组合感又保持独立形态；酱汁呈半月形环绕，不淹没食材底部
  decoration: 新鲜紫苏叶与细叶香草点缀于肉类与配菜交界处，数量控制在3-5片，形成色彩跳跃与质感对比，避免过度装饰
  negative_space: 右侧及上方保留约60%留白，突出主体食材的份量感与精致度，营造呼吸感与高端餐饮的视觉节奏
  overall_style: 现代 rustic-chic 风格，对标巴黎玛黑区精品Bistro，适合秋季晚餐场景，强调 comfort food 的精致化呈现
