content_description: 两颗金黄酥脆的圆形炸物（疑似意式炸饭团或土豆球）呈对角线摆放于白盘之上，顶部点缀深红色卷曲风干肉片，肌理如大理石般分布。侧逆光投射出清晰阴影，与深色木质桌面形成冷暖对比，呈现质朴而精致的Bistro美学。
dish_arrangement:
  plate: 哑光白瓷，椭圆浅盘，长约25cm，边沿微翘呈船型
  logic: 对角线构图法则，两点分布于盘面黄金分割点，视觉流动从左上向右下延伸，利用阴影增强立体感
  spacing: 两物间距约4cm，既保持独立完整性又形成对话关系，避免拥挤
  decoration: 零添加装饰法则，完全依靠食材本身色彩（金黄底×深红顶）和质感（酥脆×柔软）对比营造视觉焦点
  negative_space: 盘面约75%留白，集中于一侧和底部，强化呼吸感与高级餐厅的空灵美学
  overall_style: 现代北欧Bistro风格，对标Noma或Osteria Francescana的极简呈现，适合高端休闲午餐或佐酒小食场景
