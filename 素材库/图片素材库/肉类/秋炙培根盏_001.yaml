content_description: 炭烤酸种面包片托底，堆叠焦糖化球芽甘蓝与烟熏培根，呈现金黄琥珀色泽。面包边缘焦脆，蔬菜炒制入味，培根油脂浸润，整体散发秋日暖炉般的质朴香气，展现现代Bistro的舒适美食哲学。
dish_arrangement:
  plate: 复古镀锌金属托盘，长方形，工业做旧质感，浅沿设计，与背景水泥墙面材质呼应
  logic: 群组式线性构图，四件呈横向阵列排布，利用景深形成前实后虚的层次感，视线从左前方向右后方自然流动，营造纵深感
  spacing: 单品紧密排列，件间保持0.8-1cm呼吸距离，营造丰盛分享氛围；与托盘边缘保持2cm安全边距，避免拥挤
  decoration: 零添加装饰法则，完全依靠食材本身的色彩对比（培根烟粉、甘蓝金黄、面包焦褐）和质地差异（面包脆壳、蔬菜软糯、培根韧劲）构成视觉焦点
  negative_space: 背景大面积灰色水泥墙面留白，占比约65%，突出食物的暖色调；托盘内食物居中偏下放置，上方保留30%呼吸空间，强化视觉下沉感
  overall_style: 现代工业风Bistro，对标纽约Frenchette或伦敦Brawn等自然系餐厅，强调质朴与精致的平衡，适合早午餐或开胃小食的 casual
    dining 场景
