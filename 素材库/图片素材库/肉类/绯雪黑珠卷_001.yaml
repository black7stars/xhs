content_description: 精选大理石纹理和牛薄切卷成圆柱，置于金黄脆面包片之上，顶部慷慨堆砌色泽墨绿透亮的优质鲟鱼子酱，点缀新鲜山芹菜叶。一口咬下，脆、嫩、爆浆三重口感交织，呈现海陆双鲜的极致奢华。
dish_arrangement:
  plate: 纯白陶瓷圆盘，边缘微带波浪纹理，中等尺寸（约24-26cm），哑光质感
  logic: 对角线构图法则，两件主体呈八字形分布，视觉焦点从左下向右上自然流动，形成动态平衡
  spacing: 两件主食材间距约3-4cm，既保持独立美感又形成呼应，与盘边保留充足空白
  decoration: 极简装饰法则，仅使用两片新鲜山芹菜叶分别点缀于鱼子酱顶端，绿色在墨绿与绯红间形成色彩过渡与生机点睛
  negative_space: 大面积留白（约占盘面85%），集中突出食材主体，营造高端料理的空灵质感与呼吸感，强化视觉焦点
  overall_style: 现代Fine Dining风格，融合日式食材与法式摆盘美学，对标米其林星级Bistro，适合商务晚宴或特殊场合的精致前菜
