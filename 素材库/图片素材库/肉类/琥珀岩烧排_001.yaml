content_description: 精选带骨肋排经高温岩烧或炭烤，表面形成深邃的焦糖化琥珀外壳，点缀粗磨黑胡椒与香料颗粒，呈现诱人的光泽与焦香质感。肉质紧实锁汁，骨边肉风味浓郁，置于手工绿釉陶盘之上，在质朴与精致间达成平衡，诠释现代
  Bistro 对食材本真的尊重。
dish_arrangement:
  plate: 手工粗陶材质，橄榄绿釉面带有自然做旧纹理，浅口平盘，不规则波浪边沿，直径约26cm，呈现 rustic 手工质感
  logic: 对角线构图法则，两块排肉沿盘面对角线（左下至右上）非对称摆放，利用长骨作为视觉引导线，形成动态张力，符合黄金分割比例
  spacing: 两块排肉间距约4cm，与盘壁保持2-3cm安全边距，食材占据盘面约65%，营造疏密有致的呼吸感
  decoration: 零添加装饰法则（Naked Plate），完全依靠食材本身美拉德反应形成的焦糖色泽、肉汁光泽与粗粒香料作为自然装饰，突出'裸食'美学
  negative_space: 右上与左下区域刻意留白，约占盘面35%，有效平衡肉类视觉重量，营造极简高级感与焦点集中度
  overall_style: 现代 Rustic Bistro 风格，融合北欧极简美学与法式乡村小酒馆氛围，对标澳洲或斯堪的纳维亚 casual dining
    场景，强调食材本真、手工质感与焦香风味的视觉传达
