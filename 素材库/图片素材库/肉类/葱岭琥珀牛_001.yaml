content_description: 精选优质牛排切厚片，呈现完美三分熟绯红色泽，搭配焦香烤杏鲍菇，点缀细切香葱增添清新气息。底部铺设绵密土豆泥或芋泥，环绕琥珀色中式葱香酱汁，呈现中西合璧的现代Bistro美学，口感层次丰富。
dish_arrangement:
  plate: 象牙白陶瓷圆盘，浅边沿设计，直径约24cm，哑光质感，边沿微翘利于酱汁停留
  logic: 放射状构图法则，牛肉片从中心向外呈扇形辐射，菌菇穿插其间形成视觉流动线，葱花点缀建立节奏感，引导视线顺时针移动
  spacing: 牛肉片间距控制在0.8-1.2cm，既保持独立性又呈现丰盛感，菌菇与牛肉交错排列形成高低错落的空间层次
  decoration: 细香葱碎作为功能性装饰，每片牛肉顶部均匀点缀3-4处，总量约15-20个点状分布，形成绿色视觉锚点，暗示风味同时增加色彩对比
  negative_space: 盘边保留2.5-3cm纯净白色留白，与中央密集的食材形成虚实对比，突出主菜焦点，营造呼吸感和高级餐厅特有的克制美学
  overall_style: 都市现代Bistro风格，对标上海/成都新式融合餐厅，强调中西元素的和谐对话，适合商务午餐或精致晚餐场景，兼具温度与精致感
