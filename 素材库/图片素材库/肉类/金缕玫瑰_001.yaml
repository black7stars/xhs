content_description: 手工酥皮层层叠叠塑成玫瑰绽放造型，金黄酥脆的褶皱外皮包裹浓郁馅料，点缀新鲜薄荷叶增添清新气息。置于带有中东几何纹样的宽边瓷盘中央，盘心轻撒香料粉末形成朦胧光晕，呈现异域风情与现代Bistro美学的精妙平衡。
dish_arrangement:
  plate: 陶瓷材质，圆形宽边平盘，直径约26cm，边沿饰以红蓝几何民族图案，白瓷盘心提供纯净背景
  logic: 中心对称构图，采用向心式螺旋摆盘法则，酥皮褶皱从中心向外辐射形成视觉漩涡，引导视线聚焦于菜品黄金分割点
  spacing: 菜品主体占据盘面60%面积，周围保留均匀留白，酥皮边缘与盘边图案保持2-3cm安全距离，避免视觉拥挤
  decoration: 新鲜薄荷叶点状分布6-8片，沿螺旋曲线不对称点缀；香料粉末（疑似Sumac或甜椒粉）沿菜品外圈呈放射状轻撒，形成'香料光环'增强层次感
  negative_space: 白色盘心作为负形留白，占比约40%，既突出中心酥皮玫瑰的立体感，又与复杂的盘边图腾形成虚实对比，营造呼吸感
  overall_style: 新中东融合风格（Modern Middle Eastern Fusion），对标Dishoom或Shuka等高端地中海Bistro，适合约会晚餐或商务宴请场景，兼具异域神秘感与精致餐饮调性
