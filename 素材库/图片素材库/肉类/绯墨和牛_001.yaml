- 绯红色
- 深橄榄绿
- 焦糖棕
composition: 45度斜俯拍
food_presentation_style: 极简主义现代摆盘，强调食材原生质感与层次对比
season: 全年
lighting: 暖光
content_description: 精选大理石纹理和牛薄切，轻覆于烤至金黄的脆面包底之上，顶部慷慨堆砌深绿色优质鱼子酱，点缀两片微型香草叶。绯红、墨绿与焦糖三色交织，呈现东西方融合的精致小食美学，口感层次从酥脆到柔嫩再到爆浆。
dish_arrangement:
  plate: 纯白哑光陶瓷盘，圆形浅底，直径约22cm，边沿微翘设计，提供干净的视觉画布
  logic: 对角线构图法则，两件塔状菜品呈30度夹角排列，形成从左上至右下的视觉流动线，引导视线从顶部鱼子酱滑向和牛纹理
  spacing: 两件主食材间距约3cm，既保持独立性又形成对话关系，与盘边保持5cm以上呼吸距离
  decoration: 点状装饰法则，每塔顶部点缀一片微型香菜叶，共2片，形成非对称平衡，增加0.5cm高度层次与绿色色彩锚点
  negative_space: 大面积留白艺术，菜品仅占据盘面35%面积，留白集中于盘边四周及背景，强化食材珍贵感与极简美学
  overall_style: 现代北欧Bistro风格，对标Noma或Osteria Francescana等精致料理，适合高端品鉴菜单或香槟吧场景
