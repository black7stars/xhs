content_description: 精选肉片裹以浓郁酱汁干煸至外酥里嫩，与大量绯红干辣椒、青绿藤椒及新鲜香草同炒，撒上白芝麻提香。盛于质朴粗陶碗中，红绿相间，麻辣鲜香扑鼻，呈现现代中式Bistro的粗犷与精致并存之美。
dish_arrangement:
  plate: 粗陶手作碗，圆形深底，宽口设计，直径约18-20cm，边缘保留不规则手工痕迹，呈现自然质朴的肌理感
  logic: 中心聚集式构图，食材呈自然堆积状形成视觉焦点，干辣椒丝与肉片交织缠绕，引导视线呈螺旋状向中心汇聚
  spacing: 食材紧密排列占碗内容积70%，保留适度空隙让青花椒点缀其间，形成透气感与层次节奏
  decoration: 以绯红干辣椒丝为底色，点缀青绿藤椒粒形成色彩对比，三簇新鲜绿叶（九层塔/罗勒）呈三角分布打破沉闷，白芝麻均匀撒落增加质感细节
  negative_space: 碗壁与食材间保留2-3cm环形留白，深色亚麻背景与粗陶碗形成天然画框，突出食材的丰盛感与碗器的工艺美感
  overall_style: 现代中式Bistro风格，融合川味麻辣与西式 rustic 呈现手法，对标上海/成都新派创意中餐，适合秋冬暖食场景
