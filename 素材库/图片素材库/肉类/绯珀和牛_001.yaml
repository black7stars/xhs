filename: 绯珀和牛_001.jpg
path: 素材库/图片素材库/肉类/
primary_ingredient: 肉类
dish_type: 前菜
cuisine_style: 融合料理
main_colors:
- 绯红色
- 琥珀金
- 墨绿黑
composition: 45度斜俯拍
food_presentation_style: 现代极简主义中心聚焦式摆盘，强调食材质感三重奏（绵密、爆珠、酥脆）
season: 全年
lighting: 自然光
content_description: 精选和牛里脊手工切至3mm细丁，拌入细香葱碎与法式第戎芥末酱汁，塑形成紧致圆柱。顶部慷慨点缀西伯利亚鲟鱼子酱，搭配手工炸制洋姜脆片。绯红肉色与墨绿鱼子、金黄脆片形成视觉交响，口感层次从入口即化的绵密到海洋爆珠再到轻薄酥脆，展现现代Bistro对经典法餐的解构与升华。
dish_arrangement:
  plate: 纯白色哑光陶瓷圆盘，浅边沿设计，直径约24cm，极简无纹路，作为中性画布最大化突出食材本色
  logic: 中心对称构图结合垂直层次堆叠，采用'金字塔式'视觉引导：底部绯红牛肉塔基座→中部墨绿鱼子酱焦点→顶部琥珀色脆片延伸，视线由下至上自然流动；酱汁以'偶然滴落'姿态点缀右下，打破绝对对称增添动态感
  spacing: 菜品主体占据盘面中心35%黄金区域，与盘边保持充足呼吸空间；鱼子酱与脆片部分重叠营造前后景深，脆片呈45度角插入增加立体维度，各元素间保持0.5-1mm精密间距
  decoration: 遵循'食材即装饰'的极简法则，仅用三大核心元素构成视觉：鱼子酱作为黑色宝石点缀，脆片作为金色雕塑延伸，酱汁作为液体线条勾勒；零额外花草装饰，数量控制在3种以内，分布采用'三角不稳定'原则营造自然高级感
  negative_space: 大面积留白约占盘面70%，纯白色背景形成极简视觉场；留白均匀分布于四周及上方，中心聚焦；作用在于隔离视觉干扰，让食客注意力完全集中于食材的精致纹理与色彩对比，营造高端餐饮特有的空灵与克制美学
  overall_style: 现代北欧极简主义融合法式精致，对标Noma、Eleven Madison Park等米其林星级Bistro风格；强调食材本真与工艺细节，适合高端约会或商务场景，传递'少即是多'的当代美食哲学
