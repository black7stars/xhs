content_description: 精选牛舌或牛里脊切薄片，以川式藤椒与干辣椒高温爆香，裹覆琥珀色酱汁呈现油亮光泽。表面点缀新鲜青花椒粒与罗勒叶，撒白芝麻增香。粗陶碗盛装，红绿撞色鲜明，麻辣香气扑面而来，演绎川味街头美学与西式精致Bistro的完美融合。
dish_arrangement:
  plate: 粗陶深碗，手工赭石色釉面，直径约18cm，高边沿设计营造包裹感
  logic: 中心堆叠法则，肉片自然交错形成视觉焦点，辣椒呈放射状分布引导视线，绿叶点缀打破单调
  spacing: 紧密而不拥挤，肉片间保留0.5-1cm呼吸缝隙，配料穿插其间形成三维层次
  decoration: 新鲜罗勒叶3-4片作色彩点缀，青花椒粒散落10-15粒增加麻香视觉，白芝麻均匀撒布，干辣椒提供绯红色块对比
  negative_space: 碗壁四周保留2-3cm空白区域，深色亚麻背景衬托，形成天然画框效果，突出菜品主体
  overall_style: 现代Rustic Fine Dining风格，融合川味江湖气息与西式精致呈现，对标高端Bistro下酒主菜场景，强调烟火气与质感的平衡
