content_description: 长条形手工面包表面烙有品牌印记，烘烤至金黄酥脆。内填慢炖肉酱与焦糖洋葱，覆盖融化奶酪丝，点缀酸脆腌黄瓜。手持展示突出面包空气感与馅料丰盈度，呈现精致街头美食风格。
dish_arrangement:
  plate: 深色哑光陶瓷长盘（或椭圆形石板），深灰/黑色，边沿微翘，长度约25-30cm，有效衬托面包暖色调与馅料层次
  logic: 动态三角构图法则，手持上举形成视觉顶点，水平放置形成稳定基线，引导视线从品牌烙印向丰盈馅料流动，营造街头美食的活力感
  spacing: 双份呈现保持3-4cm间距，既独立成体又形成视觉对话，手持高度约15cm营造空间纵深感，避免画面拥挤
  decoration: 底部衬以1-2片新鲜芭蕉叶或竹叶，部分自然露出盘边，增加热带风情与色彩对比，平衡肉类厚重感，提升精致度
  negative_space: 背景深度虚化（bokeh效果），盘面保留30%空白区域集中在右侧与背景，突出主体并营造呼吸感，符合高端Bistro摄影美学
  overall_style: 精致休闲风（Elevated Street Food），对标现代美式Bistro，介于休闲与高端之间，适合佐酒小食场景，强调手工质感与食材本真
