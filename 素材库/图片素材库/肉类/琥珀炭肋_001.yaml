content_description: 精选带骨牛肋排经日式备长炭火慢烤，表面以法式红酒酱 glaze 形成琥珀色光泽，肉质呈现完美粉红色切面。搭配羽衣甘蓝碎点缀，置于哑光青灰陶瓷盘中，展现东西方融合料理的克制美学与炭火料理的原始魅力。
dish_arrangement:
  plate: 哑光青灰陶瓷盘，圆形浅边，直径约28cm，边沿微翘
  logic: 对角线构图法则，食材从左上至右下斜向放置，骨头朝向右下形成视觉锚点，引导视线自然流动至肉质纹理
  spacing: 食材占据盘面约40%，与盘边保持2-3cm呼吸间距，主辅料紧密贴合无空隙
  decoration: 羽衣甘蓝碎作为色彩点缀，零星分布于肉类周围形成绿色光环，约6-8片，平衡琥珀色的厚重感
  negative_space: 右下与左上方留白，约占盘面60%，营造极简高级感，突出主食材的份量感与精致度
  overall_style: 当代亚洲融合Bistro风格，对标Nobu、Zuma等高端日法融合餐厅，适合精致休闲晚餐场景，强调炭火技艺与酱汁光泽的对比
