content_description: 精选带骨肋排经高温炙烤至表面焦香酥脆，呈现诱人的琥珀色泽。配以烤土豆、小洋葱、烤大蒜等秋季根菜，置于复古金属烤盘中。整体呈现质朴而奢华的农场风格，肉质表面点缀粗粒海盐，凸显Bistro料理的粗犷与精致平衡。
dish_arrangement:
  plate: 复古金属烤盘（不锈钢材质，长方形，带双把手，浅边沿设计，做旧质感）
  logic: 中心聚焦式构图，肋排置于视觉中心呈放射状排列，骨头指向右上角形成视觉引导；根茎蔬菜环绕主肉填充边缘，形成色彩层次过渡
  spacing: 紧密堆叠式布局，食材间保留0.5-1cm自然间隙，营造丰盛饱满的视觉冲击，符合分享式主菜定位
  decoration: 零添加装饰法则，以食材本身为装饰——烤大蒜的截面纹理、洋葱的焦糖化表皮、土豆的金黄焦斑构成天然装饰；仅撒少量粗粒海盐作为质感点缀
  negative_space: 边缘最小化留白（约5%），食材填满烤盘90%面积，仅在四角保留微量呼吸空间，强化丰盛感与家庭分享氛围
  overall_style: 现代 Rustic Bistro 风格，对标Farm-to-Table概念餐厅，适合周末早午餐或晚餐分享场景，强调食材原始质感与炭火烹饪工艺
