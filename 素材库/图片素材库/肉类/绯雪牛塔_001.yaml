food_presentation_style: 现代极简主义，非对称偏心摆盘，强调留白与食材本色对比
season: 全年
lighting: 自然光
content_description: 手工切制生牛肉塔塔铺于盘侧，顶部覆盖绵密奶油泡沫或新鲜布拉塔奶酪，形成雪白穹顶，表面轻撒现磨黑胡椒粉或墨鱼汁粉点缀，红白黑三色交织，呈现干净利落的现代Bistro美学。
dish_arrangement:
  plate: 手工陶瓷盘，花瓣形波浪边沿，米白釉面配棕色做旧边缘，中号尺寸（约22cm），盘面带浮雕纹理增加光影层次
  logic: 非对称偏心构图，遵循黄金分割法则，将菜品置于盘面左上方三分之一处，形成从左至右的视觉流动，引导视线自然过渡到右侧留白区域
  spacing: 菜品占据盘面约35%，与盘壁保持2-3cm舒适间距，避免拥挤感，右侧预留充足空间放置餐具动线
  decoration: 极简直白装饰，仅用黑色粉末作为功能性装饰（兼具调味与视觉切割），无额外香草或油醋点缀，强调食材纯净度与质地对比
  negative_space: 右侧及下方大面积留白（约65%），形成强烈呼吸感，突出主体食材的精致感，符合高端Bistro少即是多的哲学
  overall_style: 现代北欧融合风格，对标Osteria Francescana或Septime等现代Bistro，强调松弛感与精致度的平衡，适合商务午餐或约会晚餐场景
