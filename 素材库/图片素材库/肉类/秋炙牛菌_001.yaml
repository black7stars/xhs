content_description: 精选肋眼牛排经高温炙烤至完美五分熟，切片呈现诱人玫瑰红色泽，搭配焦糖化烤杏鲍菇，置于丝滑芹菜根泥之上，淋以浓郁红酒骨髓汁，点缀细香葱碎。整体呈现温暖的大地色调，肉质鲜嫩多汁，菌菇焦香浓郁，层次丰富。
dish_arrangement:
  plate: 白色陶瓷浅盘，圆形，微卷边沿，直径约24-26cm，哑光质感衬托食材色泽
  logic: 放射状有机构图，以泥状基底为画布，牛肉片与菌菇交错叠放形成视觉韵律，酱汁不规则点缀增加动感，引导视线由中心向四周扩散
  spacing: 食材间距控制在0.5-1cm，保持独立性的同时形成整体感，避免拥挤或疏离
  decoration: 细香葱碎作为点状装饰，数量约8-10处，集中于牛肉表面形成色彩对比与香气层次，少量分布于菌菇增加统一性
  negative_space: 盘边保留2-3cm白色留白，形成画框效应，突出中心食材的丰盛感，同时给予视觉呼吸空间，避免过度堆砌
  overall_style: 现代法式Bistro风格，对标巴黎 neo-bistro 美学，强调食材本真与手工质感，适合 casual fine dining
    场景，展现秋日森林的丰饶意象
