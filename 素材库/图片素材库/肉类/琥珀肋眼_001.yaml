content_description: 精选优质肋眼牛排经高温炙烤形成完美焦褐色外壳，内部呈现粉嫩诱人的medium rare熟度。斜切厚片层叠摆放，表面点缀粗粒海盐与翠绿细香葱，以极简手法呈现肉质的原始奢华。油花分布均匀，肉汁丰盈，在暖光下呈现琥珀般的光泽质感。
dish_arrangement:
  plate: 深色哑光陶瓷盘（玄武岩质感），圆形，深盘设计，边沿微翘
  logic: 对角线层叠构图，从左下至右上呈阶梯状排列，引导视线聚焦肉质截面纹理
  spacing: 切片间距控制在3-5mm，既保持独立性又形成视觉连续性，避免松散
  decoration: 点状装饰法则，粗盐粒与香草碎呈不规则点状分布，数量控制在15-20点，形成色彩节奏感而不喧宾夺主
  negative_space: 右侧及底部保留40%深色留白，利用暗调背景衬托肉色，营造高级餐厅的私密氛围与呼吸感
  overall_style: 现代极简Bistro风格，对标Peter Luger或高端烧肉店，适合晚餐主菜场景，强调食材本味与熟度工艺
