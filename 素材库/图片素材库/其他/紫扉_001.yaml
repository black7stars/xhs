content_description: 这道精致甜点以光泽度极佳的巧克力半球慕斯为基底，表面交错覆盖不规则淡紫色脆片，营造如破碎瓷器的艺术质感。点缀以新鲜粉色郁金香花瓣与黄色花蕊，增添自然生机。盘缘撒落细腻紫色粉末，如雾霭般朦胧笼罩，整体呈现现代法式甜点与东方极简美学的融合。
dish_arrangement:
  plate: 白色陶瓷材质，圆形宽边浅底，盘面带有波浪纹理（水波纹/沙丘纹），边沿平滑过渡，直径约24-26cm
  logic: 中心聚焦构图，利用脆片的破碎线条创造动态视觉流动，遵循不对称平衡法则，视觉重心略偏右下，引导视线从中心向四周扩散
  spacing: 中心紧凑堆叠，四周大面积留白，主食材集中占据盘面约30%区域，脆片间保留适当缝隙展现层次感
  decoration: 粉色花瓣3-4片（郁金香花瓣）、黄色小花蕊点缀、紫色粉末撒粉装饰，数量克制精简，分布呈不对称三角构图，避免堆砌，营造自然散落效果
  negative_space: 留白比例约70%，主要分布在盘缘及左上区域，形成强烈呼吸感，突出中心甜点的精致感，符合高级餐饮留白艺术
  overall_style: 现代法式甜点融合日式侘寂美学，对标米其林星级餐厅或高端Bistro，强调季节感、破碎美感与食材本味，适合春夏品鉴
