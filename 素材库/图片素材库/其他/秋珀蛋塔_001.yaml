content_description: 这是一款待入炉烘烤的蛋奶派生胚，手工捏制的波浪形酥皮边缘呈现不规则的质朴美感，内填金黄色蛋奶液，表面布满细腻气泡，双手托举的构图传递出温暖的手作温度，整体呈现食材本真的原始状态。
dish_arrangement:
  plate: 陶瓷派盘，圆形浅底，边缘带有波浪纹设计，哑光质感，直径约22-24cm
  logic: 中心对称构图，派皮波浪边缘形成天然画框，引导视线聚焦中心蛋奶液的流动质感
  spacing: 派皮与盘壁紧密贴合，蛋液填充至距边缘1cm处，形成饱满而不溢出的视觉平衡
  decoration: 零添加装饰，依靠派皮的手工褶皱、蛋液表面自然气泡肌理以及双手入镜形成生活化装饰
  negative_space: 派体占据画面中心70%区域，四周留白与手部元素形成呼吸感，强调手作过程的叙事性
  overall_style: 质朴手工艺风格，对标法式乡村Bistro或现代家庭料理餐厅，强调从厨房到餐桌的透明感与参与感
