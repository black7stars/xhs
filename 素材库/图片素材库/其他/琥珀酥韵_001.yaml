content_description: 手工开酥卷皮裹挟季节鲜果内馅，表面呈金黄色酥层纹理。配以焦糖酱斜向拉线，点缀新鲜草莓、蓝莓、奇异果及苹果片，佐以香草奶油球与薄荷叶，底部辅以坚果碎屑与深色雪葩，呈现酥脆与清新、温暖与凉爽的口感对比。
dish_arrangement:
  plate: 白色哑光陶瓷圆盘，浅米色细边沿，直径约26-28cm，微翘边沿设计，提供干净的视觉背景
  logic: 对角线构图法则，从左上至右下形成视觉流动轴线；两件酥皮卷分置轴线两端形成呼应，中间以水果和酱汁过渡，构成S型视觉引导线，引导视线自然游走
  spacing: 元素间距控制在1-2cm，保持呼吸感；酥皮卷与水果块错落有致，避免接触导致酥皮软化，同时营造轻盈悬浮感
  decoration: 微观装饰法则，使用3簇新鲜薄荷叶点缀于酥皮卷顶部及间隙，3朵可食用紫色小花分散布置于轴线两侧，底部左下角辅以彩色碎屑（约5-6粒）增加质感层次，装饰物总量控制在9-11个，遵循奇数美学
  negative_space: 右侧约40%盘面保持纯粹留白，与左侧及中心的密集构图形成对比，突出主食材并营造高端简约氛围，同时提供视觉休息区
  overall_style: 现代欧式Bistro风格，对标米其林休闲餐厅（如Mercato或Polux），强调手工质感与季节感，适合秋季下午茶或餐后甜点场景，展现温暖舒适的氛围美学
