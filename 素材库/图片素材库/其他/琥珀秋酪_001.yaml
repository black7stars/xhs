content_description: 丝滑细腻的白色乳脂慕斯置于盘心，表面以焦糖酱勾勒出不规则线条，顶部点缀金黄酥脆的细丝。一侧配以深褐色浓郁酱汁，其中浸润着一片半透明的炖梨，整体呈现温润的秋季色调与极简美学。
dish_arrangement:
  plate: 粗陶材质、圆形深盘、大号直径（约26cm）、开片釉裂纹纹理、宽边沿设计
  logic: 偏心黄金分割构图，主体置于画面右下三分之一处，酱汁弧形从左向右包裹，形成从左至右的视觉流动引导
  spacing: 食材集中占据盘面中心区域，彼此间距控制在1-2cm形成整体感，与盘边保持大面积空白
  decoration: 金丝脆片（顶部，少量散落，增加高度与质感）、焦糖淋酱（斜向线条，3-4道，强化层次）、梨片（侧向点缀，平衡视觉重心）
  negative_space: 盘面约75-80%面积为留白，集中在左上及四周区域，突出食材主体，营造静谧高级感与呼吸感
  overall_style: 日式侘寂美学融合现代北欧Fine Dining，对标Noma风格甜点，适合高端Bistro秋季甜品菜单
