composition: 45度斜俯拍
food_presentation_style: 解构主义剖面展示，现代简约风格，强调层次对比
season: 全年
lighting: 自然光
content_description: 手工巧克力泡芙以切剖姿态呈现，外层是粗糙质感的可可脆皮，内馅为丝滑香草奶油与绯红草莓果酱的交织。顶部裱挤浓郁巧克力甘纳许，点缀心形冻干草莓碎。置于白色大理石盘中，通过质地对比与色彩碰撞，展现现代法式甜点的精致与随性。
dish_arrangement:
  plate: 天然大理石材质，圆形平盘，直径约22cm，边沿微弧无唇边，呈现冷白色调与天然灰纹
  logic: 采用三角形稳定构图，切开的泡芙置于前景左侧展示横截面，完整泡芙退后右侧形成景深层次，视觉动线由左向右流动，引导观察内部结构
  spacing: 两枚泡芙紧密相依，间距控制在2cm以内形成整体感；与盘缘保持3-4cm安全边距，避免拥挤感
  decoration: 冻干草莓碎以'星群散落'法则分布，盘面约8-10处不规则点缀，其中2片完整心形草莓片分别置于顶部奶油与盘边，形成色彩焦点；微量可可碎屑自然洒落增加质感
  negative_space: 右侧及下方保留60%以上留白，大理石天然纹理构成视觉呼吸空间，平衡巧克力主体的厚重感，营造高端甜品摄影的呼吸感与高级感
  overall_style: 现代法式Bistro风格，对标Sebastien Gaudard或Cedric Grolet的解构美学，适合精品咖啡馆下午茶场景，强调手工质感与食材本真的'不完美完美'
