main_colors:
- 琥珀金
- 雪白
- 绯红
- 靛蓝
- 翠绿
composition: 俯拍
food_presentation_style: 现代法式对角线构图，艺术化分散排列
season: 秋
lighting: 自然光
content_description: 金黄酥皮点心呈半月形层叠排列，搭配新鲜草莓、蓝莓、青苹果条及焦糖烤苹果片，点缀以新鲜薄荷叶与可食用紫花，佐以焦糖酱斜线涂抹，底部饰以花瓣碎屑与奶油球，层次丰富，色彩明快温暖。
dish_arrangement:
  plate: 哑光白瓷圆盘，浅边沿设计，直径约26-28cm，盘边饰以米色细线，质感温润
  logic: 对角线构图法则，从左上至右下形成视觉流动轴线，酥皮主体置于黄金分割点，水果沿轴线两侧错落分布，形成色彩渐变与节奏感
  spacing: 酥皮间距2-3cm保持独立存在感，水果与主体间距0.5-1cm形成紧密关联，酱汁带与食材保持0.3cm安全距离避免浸软
  decoration: 微型薄荷叶3片精准点缀于酥皮与水果间隙，可食用紫花2朵散布增加精致感，白色奶油球2颗平衡暖色调，花瓣碎屑点缀左下角增加质感层次
  negative_space: 盘面左侧及右下侧大面积留白，约占盘面60%，形成呼吸感，突出主体精致度，符合现代极简美学
  overall_style: 现代欧式Bistro风格，对标巴黎玛黑区精致小酒馆甜点，适合下午茶或餐后甜品场景，营造轻松优雅的用餐氛围
