content_description: 菜品呈现完美的圆盘状，表面以抹茶绿与深褐（黑巧或松露）交织出大理石纹理，宛若苔藓覆盖的岩石。置于青绿色哑光宽边盘中央凹陷处，色彩由外向内从青绿渐变为墨绿至深褐，营造出森林地表的自然意境，展现北欧极简美学与东方茶文化的融合。
dish_arrangement:
  plate: 青绿色哑光陶瓷宽边盘，圆形，中央圆形凹陷设计，直径约24cm，边沿平缓外扩
  logic: 严格中心对称构图，利用盘具同心圆结构形成视觉向心力，引导视线聚焦于盘心食物
  spacing: 食物直径约6cm，完全嵌入盘心凹陷处，与盘边保持均匀留白，形成环抱式空间关系
  decoration: 零装饰法则，完全依靠食材本身的大理石纹理与色彩层次作为视觉焦点，强调食材本真之美
  negative_space: 宽边盘创造约80%的青绿色留白区域，形成强烈的负空间对比，突出中心食物的珍贵感与仪式感
  overall_style: 现代北欧极简主义，对标Noma/Amass等米其林绿色系料理风格，适合高端Bistro的精致单点或品鉴菜单
