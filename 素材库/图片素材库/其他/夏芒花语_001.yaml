composition: 45度斜俯拍
food_presentation_style: 现代艺术摆盘，中心放射状构图，酱汁采用有机泼墨式不规则边缘处理
season: 夏
lighting: 自然光
content_description: 中央以芒果雪芭精心塑形成玫瑰花状作为视觉焦点，环绕三团水滴形意式蛋白霜或香缇奶油形成三角稳定结构。底部以鹅黄色水果酱汁（芒果或柠檬酱）铺陈，外圈勾勒焦糖橙色酱汁形成有机不规则边缘，点缀微型薄荷叶与白色可食用花卉，呈现清新明亮的夏日风情。
dish_arrangement:
  plate: 纯白色哑光陶瓷圆盘，宽边浅底设计（直径约28-30cm），无边沿装饰，最大化突出食材色彩
  logic: 中心聚焦式构图法则，以玫瑰形雪芭为绝对视觉锚点；三团蛋白霜呈等边三角形分布提供结构稳定性；酱汁从中心向外晕染创造动态流动感，引导视线由中心向外扩散
  spacing: 核心食材集中占据盘面中心25-30%区域，酱汁延伸至半径50%处，外围保留大量呼吸空间，符合高端甜点'少即是多'的审美标准
  decoration: 微型绿叶（4-5片）与白色小花（2-3朵）采用散点式不对称点缀，避免过度装饰；焦糖酱以5-6滴不规则圆点分布在酱汁外围，形成节奏感与味觉暗示
  negative_space: 盘面外圈70%区域保持绝对留白，强化中心甜点的精致感与珍贵感，营造画廊艺术品的展示效果，符合现代Bistro的极简美学
  overall_style: 现代北欧风融合新派法式甜点美学，对标米其林星级餐厅的甜品呈现标准，强调自然主义与几何美学的平衡，适合高端Bistro的餐后甜点场景，营造轻盈优雅的用餐终章体验
