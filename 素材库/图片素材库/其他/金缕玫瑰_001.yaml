content_description: 菜品以菲洛面皮层层叠叠编织成玫瑰花形，经烘烤呈现诱人金黄色泽，内藏香料肉酱或蔬菜馅料。表面点缀新鲜薄荷叶增添清新，盘周撒布红椒粉与香草碎形成色彩过渡，置于带有摩洛哥花纹的宽边瓷盘中，呈现异域风情与现代Bistro美学的完美平衡。
dish_arrangement:
  plate: 陶瓷材质，圆形，大号（直径约28cm），宽边沿饰以红蓝几何民族花纹，盘心纯白
  logic: 中心放射状构图法则，视觉焦点从螺旋酥皮中心向外扩散，与盘边民族花纹形成同心圆呼应，引导视线自然流动
  spacing: 菜品占据盘心约55%面积，周围保留均匀环形空间（约4-5cm）用于香料装饰，形成层次感
  decoration: 新鲜薄荷叶点缀（6-8片，沿螺旋纹理均匀分布），红椒粉与干燥香草碎呈不规则环形撒布于盘心空白处，形成色彩渐变与质感对比
  negative_space: 盘心白色区域形成自然留白，占比约45%，突出金黄色酥皮主体，同时让民族花纹盘边成为视觉框架，增强菜品仪式感
  overall_style: 现代Bistro融合北非摩洛哥元素，对标高端休闲餐厅（如The Barbary或类似风格），适合晚餐主菜场景，强调手工质感与异域风情
