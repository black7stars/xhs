content_description: 圆润的樱花慕斯置于盘心，覆盖粉色镜面淋面，顶部点缀透明樱花糖片与微型三叶草，底部铺垫抹茶坚果碎，环绕一圈樱花风味酱汁。整体呈现春日粉色系美学，融合日式樱花元素与法式甜点工艺，展现轻盈优雅的视觉层次。
dish_arrangement:
  plate: 白色哑光陶瓷大盘，圆形宽边设计，直径约28-30cm，盘面带有同心圆纹理雕刻，极简现代风格
  logic: 中心对称构图，采用向心式视觉引导，酱汁圆环形成视觉路径将视线汇聚至盘心慕斯主体，糖片垂直向上延伸打破平面感
  spacing: 主体占据盘心约1/6面积，与盘边保持4-5cm留白，酱汁圆环距慕斯底座约1.5cm形成悬浮感，顶部装饰物间距0.5cm避免拥挤
  decoration: 遵循奇数法则与不对称平衡，3片粉色透明糖片呈螺旋上升，2-3片微型绿植（三叶草与细叶香草）错落分布，1颗核桃增加质感对比，装饰物高度控制在3cm内
  negative_space: 盘边留白占比约75%，形成强烈的图底对比，白色纹理盘面作为视觉缓冲，突出粉色主体的精致感，营造高级餐厅特有的呼吸感与仪式感
  overall_style: 现代法式融合日式侘寂美学，对标米其林推荐餐厅春季限定甜点，适合高端Bistro下午茶场景，呈现精致、轻盈、季节限定的艺术感
