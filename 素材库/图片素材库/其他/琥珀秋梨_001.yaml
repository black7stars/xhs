main_colors:
- 象牙白
- 琥珀金
- 焦糖棕
composition: 45度斜俯拍
food_presentation_style: 现代法式甜点风格，简约精致，注重质感对比与立体层次
season: 秋
lighting: 自然光
content_description: 以白葡萄酒慢炖梨为主角，搭配香缇奶油与酥松小饼，点缀手工焦糖珊瑚脆片与琥珀果酱。摆盘采用不对称构图，暖金色调呼应秋季氛围，口感层次丰富，从柔软梨肉到脆片形成鲜明对比，呈现温暖治愈的尾韵体验。
dish_arrangement:
  plate: 白色哑光陶瓷平盘，圆形宽边设计，盘面带有细腻的同心圆纹理，直径约24cm，边沿微翘
  logic: 采用黄金分割不对称布局，主体食材呈对角线分布，从左下向右上延伸，焦糖脆片以45度角垂直插入形成视觉焦点，引导视线自然流动
  spacing: 食材间距控制在1-2cm，保持紧凑感的同时确保各元素独立清晰，形成中心聚焦式分布
  decoration: 焦糖珊瑚脆片作为立体主装饰（1片），琥珀色果酱点缀（3-4滴），形成色彩跳色；表面轻撒肉桂粉或焦糖碎增加质感与香气暗示
  negative_space: 右侧及上方保留约60%留白，形成呼吸感，突出甜点的精致感，同时平衡左下角的视觉重量，营造高级感
  overall_style: 现代法式Bistro风格，对标米其林星级餐厅甜品标准，适合秋冬季节的精致用餐场景，强调温暖与优雅的平衡
