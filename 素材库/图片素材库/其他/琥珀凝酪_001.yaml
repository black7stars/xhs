- 琥珀金
- 焦糖棕
- 乳白
composition: 45度斜俯拍
food_presentation_style: 现代简约美式乡村风格，强调食材本色与质地对比
season: 秋冬
lighting: 自然光
content_description: 厚切三角派块展现分明层次，外层是酥脆粗犷的手工派皮，内馅为细腻绵密的金黄色蛋奶凝乳，表面光滑如缎。顶部点缀一枚造型饼干，增添精致感。整体呈现温暖治愈的视觉效果，口感预期为酥香与丝滑的对比。
dish_arrangement:
  plate: 哑光白色陶瓷盘，圆形浅盘，直径约20-22cm，盘沿带有细微的放射状刻纹，材质温润不反光
  logic: 采用经典三角切片居中偏右放置，45度角完美展示派皮厚度与馅料层次，形成稳定的视觉重心；叉子置于左侧形成左右平衡
  spacing: 派块占据盘面中央35-40%区域，四周保持均匀留白，背景虚化展示整体派盘，营造景深与家庭温馨场景感
  decoration: 极简装饰法则，仅使用一枚叶子造型黄油饼干点缀于表面几何中心，与派皮质感呼应，数量控制在单一点缀，避免过度装饰
  negative_space: 盘面四周保留60%以上留白，突出主体甜点的色泽与质地；背景采用浅景深处理，使焦点完全集中在派块的切面细节上
  overall_style: 现代简约Bistro风格，融合美式乡村的粗犷质感与法式甜点的精致呈现，对标纽约布鲁克林风格咖啡馆或精品烘焙店，适合作为下午茶或餐后甜点的场景呈现
