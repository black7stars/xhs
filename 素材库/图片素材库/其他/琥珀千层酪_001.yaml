main_colors:
- 焦糖琥珀色
- 奶油金黄
- 大理石白
composition: 45度斜俯拍
food_presentation_style: 极简主义裸食风格，强调手工质感与食材本真状态，切口展示内部层次
season: 全年
lighting: 自然光
content_description: 手工千层酥皮包裹绵密芝士蛋奶馅，经高温烘烤形成琥珀色焦糖化表面，刷以光泽糖浆并点缀杏仁碎。切开的三角块展现酥脆外皮与柔滑内馅的质感对比，置于大理石台面呈现法式乡村甜点与现代极简美学的融合。
dish_arrangement:
  plate: 无传统餐盘，直接置于天然白色大理石台面（视为开放式餐盘），利用石材天然纹理作背景，无边沿限制，营造随性高级感
  logic: 中心构图结合动态缺口，圆形主体居中，切出的三角块向外位移形成负空间，引导视线从缺口向内探索内部质地，形成视觉流动
  spacing: 主体与画面边缘保持充足呼吸空间（约2-3倍主体直径），切块与主体间留0.5cm缝隙展示截面，控制私密感与分享感的平衡
  decoration: 极简点状装饰法则，顶部随机撒布15-20片白色杏仁碎/糖霜，呈不规则分布，打破焦糖表面的单调性，增加视觉节奏与口感暗示
  negative_space: 大面积大理石背景留白（占比约65%），环绕主体四周，突出甜点焦糖色泽；切口处形成结构性留白，展示内馅质地，营造呼吸感与高端简约氛围
  overall_style: 现代法式Bistro风格，对标高端手工甜点店如Poilâne或Jacques Genin，强调rustic elegance（质朴优雅），适合午后茶点或餐后分享场景，传递温暖手工感与精致生活美学
