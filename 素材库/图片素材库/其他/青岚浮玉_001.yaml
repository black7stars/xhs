content_description: 这道精致甜点以抹茶与青柠为风味主轴，白色奶油卷呈螺旋状轻盈排列，搭配翡翠色薄脆片与深绿凝胶点缀。盘面采用极简对角线构图，绿色粉末如苔藓般自然洒落，营造出春日山林的清新意境。口感层次从酥脆到绵密，酸甜平衡，尾韵带有茶香的回甘。
dish_arrangement:
  plate: 白色陶瓷盘，圆形大直径（约28cm），盘面带有放射状纹理，边缘呈波浪花边设计，高光釉面增强反光质感
  logic: 对角线构图法则，食材沿左下至右上方向延伸，利用卷曲奶油的螺旋曲线与脆片的直线形成刚柔对比，视觉流动呈S型引导
  spacing: 食材集中于盘面左侧1/3区域，元素间保持0.8-1.2cm呼吸间距，避免堆叠，形成疏密有致的节奏感
  decoration: 抹茶粉轻筛营造雾化效果（3处），青柠凝胶点缀（4滴呈不规则分布），绿色脆片装饰（2片），遵循奇数法则与不对称美学
  negative_space: 右侧2/3盘面大面积留白，形成强烈的视觉呼吸感，突出主食材的精致度，留白比例约65%，符合黄金分割比例
  overall_style: 现代北欧极简主义融合日式侘寂美学，对标米其林星级餐厅甜品标准，适合高端Bistro的下午茶或餐后甜点场景，强调自然、清新、精致的用餐体验
