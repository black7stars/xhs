content_description: 甄选70%黑巧与淡奶油黄金配比制成的生巧克力，手工切割成规整方块，表面轻筛宇治抹茶粉，如青苔覆石。置于素白瓷盘之上，口感绵密顺滑，入口即化，抹茶清苦与巧克力醇厚完美平衡，呈现东方美学中的留白意境。
dish_arrangement:
  plate: 哑光白瓷方盘，四角圆润呈花瓣状，浅边沿设计，尺寸约16cm，材质温润哑光，突出食物质感
  logic: 非对称对角线构图，三块生巧分布于右下象限，形成视觉重心；运用黄金分割比例，引导视线从左上留白自然过渡至右下食物群组
  spacing: 生巧块间距控制在1.5cm，既保持个体独立性又形成群组呼应；与盘边保持3cm以上间距，营造悬浮感
  decoration: 抹茶粉以'雾状撒布'技法装饰，在盘面形成由密至疏的渐变效果，模拟苔藓自然生长状态；装饰物即为食材本身，数量精准控制在3块，符合奇数美学
  negative_space: 盘面约65%为留白区域，集中于左上及左侧，形成强烈的虚实对比，赋予菜品呼吸感与想象空间，凸显'少即是多'的高级感
  overall_style: 日式侘寂美学与法式甜点工艺融合，对标京都精品茶寮或高端Bistro下午茶场景，适合搭配清酒或煎茶享用
