- 深琥珀色
- 瓷白色
- 奶油白
composition: 45度斜俯拍
food_presentation_style: 极简主义摆盘，日式串烧技法与北欧极简美学结合
season: 春
lighting: 暖光
content_description: 精选春季新鲜羊肚菌以竹签串起，经炭火炙烤至表面焦香油润，呈现深邃琥珀色泽，蜂窝状菌帽纹理清晰可见。搭配丝滑奶油蒜泥酱，中心点缀金黄橄榄油，以极简留白手法呈现，突出山野菌菇的原始质感与珍贵特性。
dish_arrangement:
  plate: 白色哑光陶瓷宽边盘，不规则波浪边沿设计，直径约22-24cm，高对比度底色突出食材琥珀色泽
  logic: 对角线构图法则，两根菌串呈左上至右下斜向分布，利用景深控制形成前景清晰、背景虚化的视觉纵深感，引导视线由近及远流动
  spacing: 两串间距约8-10cm，既保持个体独立性又形成视觉呼应，与中心酱汁构成隐形三角稳定结构，营造空间呼吸感
  decoration: 极简直击式装饰，仅以单点奶油蒜泥酱作为视觉锚点，表面点缀金黄色油滴形成色彩对比，装饰物数量控制在最小化，聚焦食材本体表现
  negative_space: 大面积留白约占盘面70%，左侧及上方留白形成开阔呼吸感，右下角密集布局形成视觉重心偏移，强调食材稀缺性与珍贵感
  overall_style: 现代北欧极简风格，对标Noma/Relae等米其林餐厅美学，适合高端Bistro春季限定菜单，强调食材本真质感与光影对比，营造静谧高级感
