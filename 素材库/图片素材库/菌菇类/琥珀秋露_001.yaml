food_presentation_style: 北欧极简主义环形摆盘，中心泡沫点缀
season: 秋
lighting: 自然光
content_description: 意式烩饭以环形铺陈于盘心，浸润在琥珀色南瓜酱汁中，点缀金黄烤南瓜块与薄片白松露。中心覆盖细腻帕玛森泡沫，如秋日晨雾缭绕。可食用小白花与细叶香草散落其间，营造林间野趣。
dish_arrangement:
  plate: 哑光白色陶瓷深盘，圆形，宽边沿设计（约28cm），极简无纹理
  logic: 环形构图法则，食材沿盘壁内侧呈360度均匀分布，中心留白形成视觉锚点；视线由外向内自然流动至松露片与泡沫层
  spacing: 食材带距盘心约3cm，形成清晰环形边界；各元素间距控制在0.5-1cm，保持呼吸感
  decoration: 三片松露呈不规则三角分布（2、6、10点钟位），四朵小白花点缀间隙（3、7、9、12点钟位），细香葱碎零星散落，总量控制在7-9点，避免过度装饰
  negative_space: 盘边保留约5cm纯白区域，占比60%；中心泡沫区域形成次级留白，突出松露纹理与食材层次
  overall_style: 现代北欧Bistro风格，对标Noma系美学，适合秋季品鉴菜单，强调食材本真与大地色系
