content_description: 手工制作的意式饺子呈金黄色帽状，包裹浓郁菌菇馅料，浸润于丝滑奶油酱汁中，搭配新鲜野生菌菇切片。勺中特写展现饺子精致褶皱与酱汁垂坠感，白色深碗衬托食材温暖色泽，呈现醇厚秋日风味。
dish_arrangement:
  plate: 白色哑光陶瓷深碗，圆形宽口，中等深度，窄边沿设计，突出食材色彩对比
  logic: 动态引导构图，以悬空勺子为视觉焦点，形成从碗底到勺中的视觉流动线，利用景深变化营造层次感
  spacing: 宽松留白，食材呈自然散落状分布，间距控制在1-2cm，避免过度堆砌
  decoration: 酱汁淋画为主装饰，白色泡沫点缀增亮，零添加草本装饰，强调食材本真
  negative_space: 大面积纯黑背景留白占比70%，强化主体；碗内奶油酱汁形成柔和底色留白，突出琥珀色饺子
  overall_style: 现代意式Bistro精致 casual dining 风格，对标高端手工意面专门店，适合秋冬晚间用餐场景
