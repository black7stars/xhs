content_description: 手工制作的意大利饺子呈饱满半月形，面皮透着蛋黄的琥珀光泽，紧密而有序地码放于白色深盘中。表面慷慨刨撒新鲜黑松露碎，如墨点般散落在金色面皮上，搭配清澈黄油酱汁。俯拍视角突出几何美感，大理石背景增添冷冽质感，整体呈现现代意式Bistro的精致与随性。
dish_arrangement:
  plate: 哑光白色陶瓷深盘，圆形，宽边沿设计（约28-30cm），深度适中以承载汤汁，纯白底色最大限度衬托琥珀色饺子与黑色松露的对比
  logic: 中心聚焦构图，饺子呈自然堆叠状形成视觉重心，松露碎从顶部撒落形成'瀑布式'视觉流动，视线从盘面中心向四周自然扩散，利用食材本身的几何形状创造韵律感
  spacing: 饺子紧密排列但保留独立轮廓，彼此重叠不超过1/3，确保每颗饺子的褶皱边缘可见；松露碎呈不规则点状分布，密度从中心向边缘递减，形成空气感
  decoration: 单一装饰法则，仅使用新鲜黑松露碎（约8-10克），以'刨撒'技法形成不规则碎屑，数量慷慨营造奢华感，分布遵循'随机中的秩序'，避免过度对称，突出自然野趣
  negative_space: 左侧及上方保留大面积纯白盘面，留白比例约45%，与右侧食物形成重量平衡，营造呼吸感和高级餐饮的克制美学，同时突出大理石背景的纹理质感
  overall_style: 现代极简意式Bistro风格，对标Rezdôra或Lilia等纽约现代意式餐厅，强调手工面食的温度与黑松露的奢华感，适合秋季晚餐场景，呈现'精致的随意性'
