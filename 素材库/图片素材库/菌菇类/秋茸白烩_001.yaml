content_description: 以意大利Arborio米慢炖而成的奶油烩饭为基底，质地绵密温润。顶部铺设煎至焦糖色的野生牛肝菌片，呈现自然的扇形纹理。点缀当季白色微型花卉与细叶香草，增添清新层次。整体色调柔和，菌香与奶香交融，传递秋日森林的丰饶气息，是一道兼具舒适感与精致度的季节限定主菜。
dish_arrangement:
  plate: 白色哑光陶瓷深盘，圆形，直径约22-24cm，浅边沿设计，突出食物色彩对比
  logic: 中心聚焦式构图，菌菇片呈自然散落状分布，形成从中心向四周的放射状视觉流动，打破对称性以增加自然感
  spacing: 菌菇片之间保持0.5-1cm呼吸间距，避免重叠；米饭均匀铺底至盘边1.5cm处，高度约占盘深2/3
  decoration: 微型白色食用花卉（约8-10朵）不规则点缀于菌菇间隙与米饭表面，形成点状节奏；少量细叶香草碎（如细香葱）作为线性元素穿插，增加色彩对比与高度层次
  negative_space: 盘面边缘保留约2-3cm纯净白边，与粗糙的棕色背景形成质感对话；食物占据盘面约70%，留出视觉呼吸感，强化极简美学
  overall_style: 现代北欧Bistro风格，对标Noma及Geranium等米其林餐厅的自然主义美学，强调'从森林到餐桌'的理念，适合秋季晚餐的intimate
    dining场景
