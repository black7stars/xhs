content_description: 精选春季羊肚菌以竹签串起，表面煎制呈现深邃琥珀色光泽与蜂窝状纹理。搭配绵密细腻的白色奶油泥或花椰菜泥，点缀金黄色香草油。置于极简白色瓷盘，利用景深效果营造前后层次，暖光下尽显菌菇的鲜美质感与高端Bistro的精致随性。
dish_arrangement:
  plate: 白色哑光陶瓷圆盘，宽边浅底设计，直径约24cm，边沿微翘形成柔和曲线
  logic: 对角线构图法则，竹签形成15度倾斜视觉引导线，前景菌帽清晰锐利，背景适度虚化，符合黄金分割比例营造动态平衡
  spacing: 两道菌串平行错落分布，纵向间距约4cm，横向错开2cm，既保持独立存在感又形成视觉呼应
  decoration: 极简直白装饰，仅以1-2滴金黄色油脂点缀于白色泥状物表面，形成色彩焦点与味觉暗示，避免喧宾夺主
  negative_space: 盘面留白占比约75%，集中于菌串上方及左侧区域，形成呼吸感与高级感，突出春季食材的珍贵与纯净
  overall_style: 现代法式Bistro风格，对标Septime或Lyle's等高端休闲餐饮，适合春季限定 tasting menu，强调食材本味与精致简约的美学表达
