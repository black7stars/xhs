content_description: 意式烩饭融合云南野生菌菇，呈现温润琥珀色泽。顶部覆盖细腻松露泡沫，点缀金黄菌菇脆片与可食用小白花。米粒饱满弹牙，野菌鲜香浓郁，泡沫轻盈细腻，口感层次丰富。现代极简摆盘，以纯白深盘衬托食材本真的山野秋意。
dish_arrangement:
  plate: 纯白哑光陶瓷深盘，圆形宽边沿设计，直径约24cm，浅凹底托举食材，营造悬浮感
  logic: 中心放射状构图，烩饭呈环形分布引导视线向心，泡沫作为视觉锚点位于几何中心，脆片以三角稳定结构嵌入，形成视觉流动闭环
  spacing: 食材集中于盘心50%黄金区域，外围保留均匀留白，各元素间距保持1.5-2cm呼吸距离，确保勺取时层次完整
  decoration: 克制装饰法则，3朵可食用小白花等距点缀环形边缘，3片不规则菌菇脆片半浸入泡沫，总装饰点控制在6-7个，遵循奇数美学
  negative_space: 大面积纯白留白环绕中心食材，占比约60%，形成强烈色彩对比，突出菜品精致感，营造高端Bistro的克制美学与呼吸感
  overall_style: 现代北欧风融合日式侘寂美学，对标Noma风格Farm-to-Table Bistro，适合秋季品鉴菜单，强调山野食材本真与季节叙事
