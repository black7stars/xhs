main_colors:
- 琥珀金
- 乳白
- 葱绿
- 岩墨黑
composition: 45度斜俯拍
food_presentation_style: 侘寂美学与西式浓汤融合，强调流动质感与质朴陶器的对比
season: 秋
lighting: 自然光
content_description: 浓郁的金黄色玉米浓汤盛于深色粗陶碗中，表面以白色奶油拉出漩涡花纹，点缀翠绿细香葱碎。金属汤勺悬于碗口上方，汤汁如丝缎般流淌而下，形成优美的动态线条。整体呈现温暖质朴的秋日氛围，质地浓稠顺滑，色彩对比和谐。
dish_arrangement:
  plate: 深色粗陶碗（岩墨色斑点釉面），圆形深碗，口径约12cm，边沿厚实不规则，呈现手作质朴质感
  logic: 中心构图法则，视觉焦点集中在汤勺与液面接触点；利用垂直流淌的汤汁形成动态引导线，将视线从画面上方自然引导至碗心，营造流动的时间感
  spacing: 汤勺位于画面上方三分之一处，与液面保持3-4cm距离，既充分展示汤汁的拉丝质感，又保留呼吸空间；汤面装饰集中于中心半径3cm区域内，形成清晰视觉锚点
  decoration: 白色奶油（或酸奶油）以同心圆方式拉花，点缀9-12粒1mm细切香葱段，呈不对称放射状分布；绿色点缀占比约5%，与金黄汤底形成冷暖对比，提升清新感与层次
  negative_space: 碗周保留充足的浅米色麻布背景，占比约45%，突出主体；深色碗体与浅色背景形成强烈明度对比，增强视觉聚焦效果
  overall_style: 现代简约Bistro风格，融合日式侘寂美学与北欧极简主义；强调食材本真质感与手工温度，适合秋季午市套餐或晚餐前菜，对标高端休闲餐厅（参考Noma风格）
