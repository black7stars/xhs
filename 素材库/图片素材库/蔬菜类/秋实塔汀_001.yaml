content_description: 以全麦杂粮面包为基底，表面附着燕麦片增添粗犷质感；中层铺陈厚切烟熏培根，呈现诱人的粉红色肌理；上层堆砌金黄南瓜泥与焦糖化烤南瓜块，质地绵密与块状口感交织；顶部撒落整粒榛子与山核桃碎，形成坚果的脆感对比。整体色调温暖饱满，充满秋日丰收意象。
dish_arrangement:
  plate: 无传统餐盘，直接置于原木色亚麻布或做旧木质台面，保留天然纹理与毛边，强化手作温度感
  logic: 四件式三角纵深构图，前二后二错落排列，形成Z字形视觉动线，引导视线由前景清晰处向背景虚化处延伸，营造空间层次感
  spacing: 紧凑式布局，件与件间距控制在1-2指宽，既保持个体独立性又呈现分享式餐点的丰盈感，适合两人分食场景
  decoration: 顶部随机撒落整粒与碎粒混合坚果（榛子、山核桃约8-10粒/件），遵循'奇数法则'与'不对称原则'，增加色彩跳跃感与质地对比，避免过度精致化
  negative_space: 背景大面积柔焦留白，蓝白青花瓷瓶占据画面上部60%空间，形成东西方美学对话，既突出食物主体又增添文化意境与呼吸感
  overall_style: Rustic Chic乡村精致风，对标北欧农场餐厅或现代日式Bistro，强调食材本真与手作温度，适合秋季 brunch 或午后茶歇场景
