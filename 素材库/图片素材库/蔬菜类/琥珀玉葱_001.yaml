content_description: 精选洋葱对半切开后慢烤至表面焦糖化，呈现诱人的琥珀色纹理，置于丝滑奶油酱汁之上。点缀以新鲜微型香草与黑色鱼子酱，盛于粗陶浅盘中。整体呈现秋冬的温润质感，通过极简摆盘突出食材的自然之美与火候掌控的精准。
dish_arrangement:
  plate: 粗陶材质，圆形浅盘，宽边设计，直径约24cm，浅灰色带深色斑点纹理，哑光质感
  logic: 对角线构图法则，两半洋葱分别置于盘中轴线的上下方位，形成视觉对称与平衡；奶油酱汁以不规则椭圆形铺陈于中央，作为连接两个洋葱的 visual bridge，引导视线自然流动
  spacing: 食材集中分布于盘面中央30%区域，保持1.5cm间距避免接触，既独立成景又相互呼应
  decoration: 精准点缀法则，每半洋葱放置3-4片微型香草叶（如百里香或牛至）及5-6粒黑色鱼子酱，集中于焦糖化表面，形成色彩对比（绿/黑/金棕）与视觉焦点，数量克制以显高级
  negative_space: 大面积留白占盘面约70%，均匀分布于左右两侧及边缘，营造呼吸感与静谧氛围，突出食材主体，符合北欧料理的极简美学
  overall_style: 现代北欧Bistro风格，对标Noma或Geranium的精致 casual dining 场景，强调粗陶器皿与精致食材的质感对比，适合秋季品鉴菜单，传递温暖而克制的料理哲学
