food_presentation_style: 自然清新风格，强调食材本真的质感与色彩
season: 春
lighting: 自然光
content_description: 细腻绵密的牛油果香草奶油盛于复古翠绿高脚玻璃杯中，表面柔滑如绢，边缘点缀一片鲜绿青柠。杯旁自然散落新鲜香菜叶与嫩绿葱丝，背景以柔白织物衬托，整体呈现春日清晨般的清新与生机，质感轻盈而富有层次。
dish_arrangement:
  plate: 翠绿玻璃高脚杯（冰淇淋杯造型），复古透光质感，中等容量（约200ml），杯口微敞利于展示内容物质地
  logic: 对角线构图法则，主体位于画面左下三分点，香菜与葱丝从右下向左上延伸，形成从杯体到配料的视觉流动线，引导视线自然游走
  spacing: 紧密式间距控制，香菜束与杯体底座轻微交叠，营造食材与器皿的亲密感；杯体与背景织物保持适度距离以突出主体
  decoration: 新鲜香菜（3-5茎带叶）、细切葱丝（2-3根）、青柠切片（1片半埋于奶油中），装饰物呈自然散落状分布，强化'刚采摘'的新鲜感，数量精简避免喧宾夺主
  negative_space: 右上与右侧大面积留白，以虚化的白色针织织物填充，形成柔和朦胧的背景留白；占比约60%，有效突出主体色彩与质感，营造呼吸感
  overall_style: 北欧田园风Bistro，对标自然主义料理（Naturalist Cuisine），适合早午餐或轻食场景，传递健康、有机、季节性的饮食理念
