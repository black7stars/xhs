content_description: 四枚精致的开面小食以杂粮酸种面包为底，依次层叠鲜切牛油果、薄切伊比利亚生火腿，顶部点缀混合黑橄榄碎的香草奶油奶酪。色彩由深褐渐变为翠绿、绯红直至乳白，呈现丰富的视觉层次与质朴的自然美学。
dish_arrangement:
  plate: 天然橡木砧板，不规则圆形，厚度约3cm，保留原始树皮边沿，直径约25cm
  logic: 采用三角形动态构图，四枚小食呈菱形错位摆放，形成前后景深；视觉焦点落于前景中央单品，引导视线顺时针流动
  spacing: 单品间距4-5cm，既保持独立存在感又形成群组关系；与砧板边缘保留3cm安全边距
  decoration: 零添加装饰法则，完全依靠食材本色对比（牛油果绿、火腿绯红、奶酪乳白、谷物深褐）构成色彩装饰，顶部奶酪自然起伏形成纹理焦点
  negative_space: 上部保留40%灰色虚化背景形成呼吸空间，下部木质桌面占比60%提供温暖基调，整体留白营造静谧氛围
  overall_style: 现代北欧Bistro风格，对标Noma系轻食美学，适合Brunch时段或佐酒小食场景，强调食材本味与手工质感
