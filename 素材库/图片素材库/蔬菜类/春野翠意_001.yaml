composition: 45度斜俯拍
food_presentation_style: 自然主义北欧风，质朴优雅（Rustic Elegant），强调食材本真与春日生机
season: 春
lighting: 自然光
content_description: 手工意大利细面裹以新鲜罗勒青酱，呈现春日森林般的翠绿色泽。搭配炭烤紫芦笋与嫩绿荷兰豆，撒上金黄香草面包糠增添酥脆层次。置于深蓝哑光陶盘中，以原木托盘承托，点缀新鲜欧芹叶，整体散发清新田野气息，诠释春季蔬食的纯粹美学。
dish_arrangement:
  plate: 深蓝哑光陶瓷盘（圆形，中等深度，约24cm直径），置于圆形胡桃木托盘（35cm直径，保留天然木纹）上，形成双层质感对比
  logic: 中心放射构图，面条自然螺旋堆叠形成视觉焦点（高度约4cm），蔬菜沿面条走向不规则分布，引导视线从中心向边缘流动；面包糠沿盘边呈180度弧线撒落，形成半包围结构
  spacing: 面条占据盘面65%，边缘保留2-3cm呼吸带；配料（芦笋3段、荷兰豆2片、紫芦笋片1片）呈非对称三角分布，避免拥挤；木勺斜置45度，与盘面形成动态平衡
  decoration: 新鲜意大利欧芹（3-4片，置于11点钟方向），散落荷兰豆荚（画面右上方，3片，形成视觉延伸），香草面包糠（小碗置于右侧，盘面边缘点缀），金色餐具（右下角，与灰色餐巾形成材质对话）
  negative_space: 深色水泥背景占据画面40%，形成深邃氛围；木质托盘与深蓝盘面间的环形空隙（约3cm）强化层次感；面条间的酱汁空隙营造透气感，避免视觉压迫
  overall_style: 现代北欧Bistro风格，对标Noma或Local Seasonal Dining概念，强调Farm-to-Table理念；适合春季限定菜单，营造森林系用餐场景，目标客群为追求自然主义美食体验的中高端消费者
