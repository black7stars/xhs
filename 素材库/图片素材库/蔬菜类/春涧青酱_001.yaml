season: 春
lighting: 自然光
content_description: 鲜绿色的西兰花青酱均匀包裹每根通心粉，表面撒上现磨帕玛森芝士与新鲜罗勒叶，盛于质感温润的陶瓷深碗中。酱汁质地粗犷保留食材纤维感，呈现自然主义的美食美学，传递春季的清新与活力。
dish_arrangement:
  plate: 米色芝麻点陶瓷深碗，圆形，中等深度，温润质感
  logic: 中心放射状自然堆叠，采用非对称平衡法则，面条呈松散交错状营造蓬松感，视觉焦点向中心聚拢后自然向外扩散
  spacing: 面条间保持0.5-1mm呼吸间隙，避免压实；碗壁保留1.5cm干净边沿，形成天然画框
  decoration: 现磨帕玛森芝士碎（白色星点状分布，约15-20处）+ 手撕新鲜罗勒叶（翠绿色，6-8片，随机散落），营造自然落雪般的随意感
  negative_space: 碗外背景大面积纯白留白（占画面60%），右下角置入小碟芝士粉形成对角线呼应，既平衡构图又暗示用餐仪式感
  overall_style: 现代乡村Bistro风格（Modern Rustic），对标 abcV 或 Dimes 等健康轻食餐厅，适合春日午市或轻晚餐场景，强调
    farm-to-table 的质朴高级感
