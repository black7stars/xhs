content_description: 两片烘烤酥脆的酸种面包上，铺满绵密的新鲜牛油果泥，搭配流心水煮蛋与蓬松的里科塔奶酪，点缀以新鲜莳萝与香料芝麻。色彩明快清新，呈现现代早午餐的轻松优雅美学，口感层次丰富，营养均衡。
dish_arrangement:
  plate: 哑光质感白瓷盘，不规则手工捏制边缘，浅盘设计，直径约26cm，略带弧度边沿
  logic: 对角线构图法则，两片吐司呈对角线放置形成视觉引导线；蛋黄位置前后错开，创造韵律感与景深
  spacing: 两片吐司保持1.5cm亲密间距，既分离又关联；食材边缘与盘沿保留3cm以上呼吸距离
  decoration: 新鲜莳萝枝条作为线性装饰，共5枝，交叉分布于吐司表面及间隙；黑白芝麻与香料碎随机撒落增加颗粒质感；装饰物沿对角线自然分布
  negative_space: 盘子左右两侧及上方保留大面积留白，占比约45%，突出中央食物主体，营造简约高级感与呼吸感
  overall_style: 现代澳式Brunch风格，对标Granger & Co.或The Ivy，适合阳光早午餐场景，轻松自然又不失精致格调
