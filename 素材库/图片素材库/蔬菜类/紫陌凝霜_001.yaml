composition: 俯拍
food_presentation_style: 极简主义花卉艺术摆盘，强调自然形态与色彩层叠
season: 春
lighting: 自然光
content_description: 精选春季可食用花卉与根茎薄片，以紫罗兰、玫瑰花瓣铺陈于底部，点缀粉白渐变的腌制萝卜片，中央置入两颗雪白奶酪球或柚子雪葩。色彩由深紫向乳白过渡，如晨雾中凝结的霜花，呈现春日花园的脆弱美感与清新气息。
dish_arrangement:
  plate: 哑光白色陶瓷深碗，圆形，直径约16cm，无沿设计强调内容物悬浮感
  logic: 中心放射状构图，以双球为核心形成视觉锚点，花瓣呈螺旋状向外延展，引导视线由中心向四周扩散
  spacing: 花瓣间保持2-3mm微距，避免重叠挤压；球体与花瓣形成高低落差约1.5cm的立体层次
  decoration: 遵循'减法装饰'法则，仅使用8-10片天然花卉作为装饰，零人工酱汁或香草，依靠食材本身色彩对比创造画面张力
  negative_space: 碗外保留85%的灰色水泥桌面留白，利用粗糙质感与碗内精致形成材质对话，强化主体神圣感与孤立美学
  overall_style: 北欧新派料理（New Nordic）与日式侘寂美学结合，对标Noma或Geranium风格，适合高端Bistro春季限定菜单，营造'可食用的花艺装置'体验
