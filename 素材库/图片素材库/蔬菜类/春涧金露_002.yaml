content_description: 精选当季鲜嫩芦笋垂直阵列摆放，顶部覆盖丝滑金黄荷兰酱自然流淌而下，点缀微型香草与奶油泡沫。翠绿与明黄在纯白瓷盘上形成鲜明对比，呈现春日清新美感，诠释现代法式料理的纯粹美学与轻盈质感。
dish_arrangement:
  plate: 白色瓷质平盘，圆形，直径约26cm，盘沿饰以细金边，内壁有淡金色环线，质感温润
  logic: 垂直中轴对称构图，五根芦笋平行排列形成视觉主轴，金黄色酱汁横向铺陈于中部形成色彩焦点，白色装饰物左右非对称分布平衡画面
  spacing: 食材仅占盘面中央约40%区域，芦笋间距精确控制在0.8cm，酱汁与芦笋保持自然重叠，装饰物与主食材保持2-3cm呼吸间距
  decoration: 微型香草（Microgreens）三处点缀，搭配不规则分布的白色奶油泡沫共七滴，形成点线面结合的节奏感，既增添紫红与翠绿对比又不喧宾夺主
  negative_space: 盘面下半部及外圈保持大面积留白，占比约60%，营造极简主义的高级感，突出食材本身的线条美，给予视觉充分的呼吸空间
  overall_style: 现代法式Bistro风格，对标巴黎Neo-bistro美学，适合春季限定菜单，呈现清新自然、精致不浮夸的当代料理理念
