food_presentation_style: 自然主义侘寂美学，强调季节感与食材本真，花瓣散落营造落英缤纷意境
season: 春
lighting: 自然光
content_description: 精选春季时令山菜裹以轻薄天妇罗面衣炸至金黄酥脆，点缀当季绯红樱花瓣，佐以环形琥珀色酱汁，呈现春日自然之美。食材堆叠于粗陶浅碗中央，花瓣自然散落，营造落英缤纷的诗意氛围。
dish_arrangement:
  plate: 粗陶材质，浅碗器型，直径约20-22cm，边缘不规则呈现手工捏制质感，米灰色调釉面带有细小铁斑，哑光质地
  logic: 采用中心聚焦构图，食材以不规则堆叠方式形成视觉重心，酱汁以不规则环形轨迹围绕食材形成向心式视觉引导；花瓣沿酱汁轨迹自然散落，强化动态美感与春日飘落意境
  spacing: 食材占据盘面中央约40%区域，与盘边保持2-3cm呼吸间距，酱汁填充食材与盘边过渡区域，整体留白率约35%，避免视觉压迫感
  decoration: 使用可食用粉色花瓣（樱花/桃花）约12-15片，遵循'三分之一法则'分布于食材表面及盘周；琥珀色酱汁以滴落式手法形成不规则圆环，增加盘面流动性与光泽感
  negative_space: 盘面左上与右下区域保留显著留白，约占盘面30%，采用不对称设计，符合东方美学中的'间'概念，突出食材主体并营造视觉休息空间
  overall_style: 新日式融合Bistro风格，强调'旬之味'季节限定理念，对标东京米其林一星或沪上高端日料店，适合春季赏味菜单，营造自然、精致、略带野趣的沉浸式用餐体验
