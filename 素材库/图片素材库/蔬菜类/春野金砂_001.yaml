season: 春
lighting: 自然光
content_description: 精选当季鲜嫩绿芦笋呈扇形放射排列，表面微煎呈现诱人焦痕。根部覆盖金黄酥脆的培根面包糠碎，中段浸润于乳化的香草黄油酱汁中，点缀细香葱碎。黑陶盘衬托出芦笋的翠绿与酱汁的温润色泽，呈现春日清新与酥脆口感的完美平衡。
dish_arrangement:
  plate: 哑光黑陶浅碗，手工斑点纹理，圆形无沿设计，直径约22cm，深度3cm，提供深色背景以突出食材色彩对比
  logic: 对角线放射构图，芦笋从左上向右下呈扇形展开，形成视觉引导线；酥脆碎屑集中于右下形成质感重心，酱汁填充中段形成色块过渡，遵循'三分法则'
  spacing: 芦笋茎部保持2-3mm精密间距，既呈现整齐序列感又避免拥挤；酱汁覆盖约60%盘面，碎屑占据右下角1/3区域，形成疏密对比
  decoration: 细香葱碎均匀撒于酱汁表面（约200粒），提供色彩点缀与香气层次；金黄面包糠混合培根碎（约3汤匙）堆叠于芦笋根部，制造酥脆质地与视觉焦点
  negative_space: 右侧及左下角保留30%黑色盘面留白，形成'呼吸空间'，突出主体线条感，营造高端Bistro的极简美学与高级感
  overall_style: 现代北欧Bistro风格，强调食材本真与季节感，对标Noma系或新美式休闲精致餐饮，适合春日午间套餐或晚餐前菜，呈现自然质朴与精致工艺的平衡
