content_description: 两颗整颗洋葱经高温炭烤至外层焦香焦糖化，切面呈现半透明琥珀质感，置于丝滑细腻的根茎类奶油泥之上。点缀以新鲜百里香叶与腌渍刺山柑，粗陶器皿的温润质感与食材的烟火气息形成对话，呈现秋冬时节的质朴奢华。
dish_arrangement:
  plate: 粗陶质地浅口圆盘，直径约28cm，米灰色釉面带有细微斑点纹理，边缘微翘形成柔和过渡
  logic: 对角线构图法则，两颗烤洋葱呈斜向轴线分布，形成45度视觉流动方向，引导视线从左上焦糖化表皮延伸至右下酱汁肌理
  spacing: 宽松间距控制，主食材占据盘面中央30%区域，保持2-3cm安全距离避免拥挤
  decoration: 点状装饰法则，以5-6片微型香草叶与8-10颗黑色刺山柑精准点缀于洋葱切面缝隙，形成色彩对比与味觉暗示
  negative_space: 大面积留白艺术，盘面70%区域保持空白，利用粗陶材质的颗粒感营造视觉呼吸空间，突出食材的精致感与孤独美学
  overall_style: 现代北欧Bistro风格，对标Noma系料理哲学，适合秋冬晚间套餐的前菜环节，强调从土地到餐桌的原始质感
