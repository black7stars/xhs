season: 春
lighting: 自然光
content_description: 以抹茶或菠菜面糊为媒介，运用挤压工艺在瓷盘表面绘制出蜿蜒的藤蔓造型，叶片呈镂空环状，线条流畅优雅。纯白盘面与翠绿食材形成强烈视觉对比，呈现春日枝蔓生长的自然诗意，兼具可食性与装置艺术感。
dish_arrangement:
  plate: 纯白陶瓷平盘，圆形，直径约24cm，盘沿带有细微同心圆纹理，哑光质感，无边沿设计强调画布感
  logic: 采用对角线构图法则，藤蔓从左侧延伸至右侧，形成视觉流动线；运用黄金分割点定位主体枝桠分叉处，引导视线自然游走于叶片之间
  spacing: 食材占据盘面约35%，叶片间距控制在1.5-2cm，保持透气感；主枝与盘面边缘保留3cm安全距离，形成呼吸带
  decoration: 零添加装饰法则，仅以食材本身作为装饰元素；通过15-18片大小不一的镂空叶片营造韵律感，分布遵循疏密有致原则，末端叶片逐渐变小形成渐弱效果
  negative_space: 大面积留白集中于盘面上半部及右侧，占比约65%，强化极简美学；留白区域与藤蔓形成虚实对比，突出春日生机与宁静意境
  overall_style: 新中式极简Bistro风格，对标Noma或Localismo等先锋餐厅的植物系料理，适合春季限定菜单或艺术主题晚宴，强调食材本真与手工温度
