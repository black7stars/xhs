content_description: 精选时令芦笋中段，保留翠绿笋尖，去皮后展现温润玉色质地。覆盖金黄色泡沫酱汁（荷兰酱或柠檬黄油乳化酱），点缀酸奶油球与微型紫苏、百里香叶，呈现春日清新与精致感。
dish_arrangement:
  plate: 白色瓷质圆盘，玫瑰金细边，浅盘设计，直径约26-28cm，突出食材色彩对比
  logic: 对角线构图法则，芦笋从右上向左下呈放射状排列，酱汁沿芦笋自然流淌形成视觉引导线，营造动态流动感
  spacing: 芦笋之间保持0.5-1cm均匀间距，主食材与盘边保留3cm以上距离，装饰物呈三角分布形成视觉锚点
  decoration: 点缀法则：微型香草（紫叶紫苏、绿叶百里香）共5-7片，酸奶油球3大2小，分布于芦笋交汇点及盘面空白处，形成色彩节奏与层次对比
  negative_space: 左下象限大面积留白，约占盘面60%，右侧集中主食材，留白突出酱汁流淌的艺术形态，营造呼吸感与高级感
  overall_style: 现代法式Bistro风格，对标巴黎L'Ami Jean或Spring餐厅，适合春日午间套餐或精致晚餐前菜，强调食材本真与酱汁技艺的结合
