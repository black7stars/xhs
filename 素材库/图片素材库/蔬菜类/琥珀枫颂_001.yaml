content_description: 金黄色南瓜派表面光滑如镜面，点缀手工枫叶形酥皮装饰并撒以肉桂糖霜，边缘捏褶酥皮呈现完美焦糖色泽。一片派被优雅铲起，展现细腻绵密的内馅质地与酥脆塔底的层次对比，整体散发浓郁温暖的秋日氛围。
dish_arrangement:
  plate: 金属派盘，圆形浅底，银色哑光质地，边沿微卷
  logic: 放射状构图法则，八等分切割线从中心向外辐射，视觉焦点集中于中心枫叶装饰与被托起的切片，形成动静结合的视觉流动
  spacing: 均匀八等分切割，每片夹角45度，中心装饰物精准对齐每片派尖，间距控制体现分享式甜点的仪式感
  decoration: 枫叶形酥皮装饰，共8片对应每块派，表面撒粗粒肉桂糖形成纹理质感，分布于每片派中心位置，呼应秋季主题
  negative_space: 金属盘边缘的银色环形留白包围主体，占比约15%；铲起切片后露出的扇形空缺形成动态留白，增强画面呼吸感与食欲诱导
  overall_style: 美式精致乡村风格融合现代Bistro极简美学，对标高端休闲餐厅的秋季限定甜品，适合下午茶或餐后分享场景
