filename: 春野乳酪球_001.png
path: 素材库/图片素材库/蔬菜类/
primary_ingredient: 蔬菜类
dish_type: 小吃
cuisine_style: 融合料理
main_colors:
- 森林绿
- 麦穗金
- 暖橙
composition: 45度斜俯拍
food_presentation_style: 质朴手工风格，强调食材天然纹理与不规则的手工捏制质感，呈现温暖的家庭式烹饪美学
season: 春
lighting: 自然光
content_description: 手工制作的菠菜奶酪球，将新鲜菠菜与芝士、面包糠完美融合，捏制成圆润的小球状。表面可见翠绿的菠菜叶丝与金黄的奶酪质地交织，呈现出自然的纹理感。摆放在烘焙纸上，呈现出温暖的家庭式烹饪氛围，却又不失精致的质感。
dish_arrangement:
  plate: 长方形金属烤盘（或木质托盘），内铺白色烘焙纸，边缘微卷呈现自然弧度，营造即将入炉或刚出炉的临场感
  logic: 采用网格矩阵式构图，利用浅景深创造纵深感，前景清晰聚焦，背景渐进虚化，引导视线从前向后流动，形成视觉韵律与空间层次
  spacing: 球体间保持约1.5倍直径的均匀间距，既保证烘烤时的热风循环，又形成整齐而有呼吸感的视觉节奏，避免拥挤
  decoration: 零添加装饰法则，完全依靠菠菜的天然翠绿与奶酪/面包糠的金黄形成色彩对比，表面不规则的叶脉纹理与颗粒感即是最佳装饰，强调食材本真
  negative_space: 大面积白色烘焙纸作为负空间，占比约60%，分布于球体周围，突出食材本色，营造极简主义美感，同时暗示'待烹饪'的期待感与纯净感
  overall_style: 现代简约Bistro风格，强调farm-to-table理念，呈现食物最本真的手工质感，介于家庭温馨与餐厅精致之间，适合早 brunch
    或佐酒小食场景
