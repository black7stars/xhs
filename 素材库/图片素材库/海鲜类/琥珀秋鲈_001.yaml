content_description: 精选海鲈鱼柳带皮煎制至金黄酥脆，皮面呈现漂亮条纹刀痕。配以丝滑土豆泥围成半月形，中心注入琥珀色黄油酱汁，点缀两根翠绿嫩茎西兰花。整体呈现温暖秋意，口感层次从酥脆到绵密，诠释现代Bistro的精致舒适感。
dish_arrangement:
  plate: 白色陶瓷浮雕盘，圆形宽边设计（约26cm），盘缘带有复古卷草纹浮雕，中央凹陷，法式乡村风格与精致感并存
  logic: 对角线动态构图，从左上土豆泥向右下鱼肉延伸，形成约45度视觉动线；采用不对称平衡法则，以大面积土豆泥的柔和曲线平衡鱼肉的直线切割感
  spacing: 食材间保持0.5-1cm呼吸间距，鱼肉与蔬菜呈倚靠状但不重叠，确保每样食材独立可见又整体统一
  decoration: 零添加装饰法则（No Garnish），仅以食材本色呈现；酱汁作为唯一液体装饰，精准控制在土豆泥中心形成琥珀色镜面焦点，数量仅一处，起到画龙点睛之效
  negative_space: 盘子右侧及边缘保留约40%留白，利用纯白盘面衬托食物色彩，营造高级感与呼吸感，避免视觉拥挤
  overall_style: 现代欧式Bistro风格，介于Fine Dining与Comfort Food之间，对标巴黎玛黑区精品小馆，适合秋季晚餐场景，强调食材本味与手工质感
