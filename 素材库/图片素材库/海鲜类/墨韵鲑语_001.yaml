content_description: 以墨鱼汁黑面包为冠，层叠烟熏三文鱼、新鲜马苏里拉奶酪与绵密牛油果泥，底部辅以时令蔬菜沙拉与腌制紫甘蓝，点缀石榴籽与菲达奶酪碎，搭配特调渐变抹茶芒果饮，呈现视觉与味觉的双重层次。
dish_arrangement:
  plate: 白色陶瓷平盘，圆形，直径约28cm，黑色细边设计，极简现代风格
  logic: 中心对称构图，垂直层叠法则，视线从顶部黑色面包引导至底部色彩丰富的蔬菜基底，形成纵向视觉流动
  spacing: 三明治主体占据盘面60%中心区域，四周保留适度空间，蔬菜装饰自然散落形成呼吸感
  decoration: 顶部点缀红色酱料与可食用花卉，盘周散落菲达奶酪碎、石榴籽、腌制紫甘蓝丝，数量控制在5-7点，形成不对称平衡
  negative_space: 盘面右侧与左下角保留大面积留白，占比约40%，突出主体同时营造高级感，为饮品入镜预留视觉空间
  overall_style: 现代北欧极简Bistro风格，对标Noma美学，适合高端早午餐或轻食晚餐场景，强调食材本味与视觉对比
