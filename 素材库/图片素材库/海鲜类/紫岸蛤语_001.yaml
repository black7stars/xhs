content_description: 新鲜鸟蛤半开壳陈列于粗陶碗中，贝肉饱满浸润清汤，点缀以嫩黄色食用花与细叶香草，碗后衬以风干薰衣草枝营造海岸原野气息。整体呈现自然质朴的北欧美学，色彩柔和淡雅，充满春日生机与海洋鲜甜。
dish_arrangement:
  plate: 粗陶浅碗，哑光米白釉色，手工质感，口径约16cm，无沿设计呈现原始朴拙之美
  logic: 中心放射构图，三只开口贝类呈品字形分布于前景形成视觉焦点；闭合贝类自然堆叠中后部营造层次纵深；薰衣草从碗后上方呈扇形逸出，纵向延伸打破圆形碗的平面局限
  spacing: 贝类间距控制在0.5-1cm，既保持个体独立性又形成群组关联；装饰花草精准点缀于贝肉中心，不溢出壳缘，保持精致度
  decoration: 食用花（黄色小花3朵、白色碎花少许）+细叶香草（3支）+风干薰衣草（8-10枝）。装饰呈点状分布，形成色彩对比（黄紫互补）与高度层次（低-中-高），增强三维立体感
  negative_space: 碗周保留约70%的灰色水泥桌面留白，突出主体并营造呼吸感；碗内部贝类间空隙形成自然负形，避免视觉拥挤，强化极简美学
  overall_style: 现代北欧Bistro风格，对标Noma/Amass等自然主义餐厅，适合春季海鲜套餐开场或单点分享，强调从海洋到餐桌的原生态理念，营造轻松精致的用餐仪式感
