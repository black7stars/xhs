content_description: 精选鲜活龙虾尾卷曲成环状卧于盘侧，顶部堆砌珍贵黑鱼子酱如墨玉皇冠，配以丝滑琥珀色海鲜浓汤，酱汁表面以墨黑圆点构成韵律装饰，点缀翠绿微型香草嫩芽，呈现海陆交融的奢华口感与视觉张力。
dish_arrangement:
  plate: 白色哑光陶瓷深盘（汤盘），圆形，直径约24cm，宽边设计，浅碗底
  logic: 非对称黄金分割构图，主材偏右占据视觉焦点，酱汁从左向右形成流动感；七点墨黑圆点呈弧线排列，引导视线从酱汁自然过渡至龙虾主体，形成视觉动线
  spacing: 龙虾环与盘壁保持2cm呼吸间距，鱼子酱堆叠于环心形成高度焦点，酱汁液面控制在盘深1/2处，与主材紧密相贴但界限清晰
  decoration: 微型香草（5株） strategically 分布于龙虾缝隙与鱼子酱顶部，打破厚重感；墨黑香醋浓缩液（7滴）以不规则等距点缀于金色酱汁，形成波点艺术效果
  negative_space: 右侧及上方保留40%纯白空间，营造高端料理的呼吸感；白色盘底作为画布，强烈衬托琥珀与绯红的食材色泽，凸显极简奢华
  overall_style: 现代法式Bistro精致料理，对标米其林一星标准，适合商务宴请或纪念日场景，强调食材本味与视觉艺术的平衡
