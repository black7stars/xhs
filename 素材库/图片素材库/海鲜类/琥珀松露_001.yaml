content_description: 这道精致握寿司以紧实醋饭为基底，中层铺陈焦糖化处理的金黄色食材（疑似烤海胆或南瓜），顶部覆盖丰腴泥状物，慷慨刨撒新鲜黑松露薄片并点缀金箔。暗调摄影下，琥珀色光泽与墨色松露形成强烈对比，呈现极简奢华的视觉效果。
dish_arrangement:
  plate: 无传统餐盘，直接置于黑色反光镜面或隐形平板之上，营造食材悬浮于暗夜的视觉效果
  logic: 垂直轴向堆叠构图，色彩由下至上从象牙白过渡到琥珀金再到墨黑，形成明确的视觉梯度与层次聚焦
  spacing: 单品独立呈现，四周预留大量负空间，强调一口料理的珍贵感与仪式感
  decoration: 新鲜黑松露薄片（占比约25%）与食用金箔（微量散落点缀）构成'黑金'奢华组合，分布呈自然散落状而非对称排列
  negative_space: 纯黑背景占据画面85%以上，食材位于视觉中心黄金分割点，形成博物馆展品般的神圣聚焦效果
  overall_style: 当代日式融合料理，对标东京/纽约米其林Omakase或高端Bistro，强调食材稀缺性、工艺精细度与暗黑奢华美学
