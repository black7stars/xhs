primary_ingredient: 海鲜类
dish_type: 前菜
cuisine_style: 融合料理
main_colors:
- 玫瑰粉
- 樱桃红
- 薄荷绿
- 琥珀金
composition: 45度斜俯拍
food_presentation_style: 现代主义堆积式摆盘，强调色彩对比与食材肌理
season: 夏
lighting: 自然光
content_description: 精选蓝鳍金枪鱼切成骰子丁，搭配新鲜樱桃果肉与红洋葱碎，点缀细叶香菜，佐以柑橘酱油汁。一旁配以丝滑牛油果泥，色彩明快。鱼肉鲜嫩，果香清新，酸甜咸鲜平衡，呈现夏日清爽风味。
dish_arrangement:
  plate: 白色陶瓷宽边浅盘，圆形，哑光质感，直径约24-26cm，浅边沿设计提供充足画布空间
  logic: 非对称中心偏右构图，采用堆积式（Piling）技法形成立体视觉焦点。食材从右上牛油果泥向左下酱汁扩散区形成对角线视觉流动，利用高度差（牛油果泥高于鱼生）创造层次感，符合现代北欧料理的解构美学
  spacing: 食材集中占据盘面右侧40%区域，保持紧密堆叠呈现丰盛感，与左侧盘边保持约60%留白距离，形成张弛有度的空间节奏
  decoration: 以细叶香菜（山萝卜苗或欧芹嫩叶）作微型香草点缀，共8-10片，随机分布于食材表面及左下空白处，增加高度层次与色彩对比。樱桃切半作为结构性装饰，其光泽表面与哑光鱼肉形成质感对比
  negative_space: 左侧大面积留白（约60%盘面），形成强烈呼吸感，突出食材主体。琥珀色酱汁从食材底部向左下自然流淌，在白色盘面上形成抽象线条，将空白区域转化为视觉延伸部分，增强艺术表现力
  overall_style: 现代北欧Bistro风格，融合日式刺身美学与西式精致摆盘，对标Noma或Geranium等现代料理的简约主义。适合高端休闲午餐或精致晚餐前菜场景，强调季节性食材与色彩纯粹性
