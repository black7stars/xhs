content_description: 厚切鲭鱼经熟成处理后表皮轻炙至焦褐酥脆，肉质呈现通透的粉玉色泽，以45度角优雅立于金黄色细腻泡沫之上。泡沫质地轻盈绵密，色泽如琥珀般温暖，表面点缀微量柠檬皮屑或香草碎。整体呈现北欧料理的纯净美学，通过极简构图突显食材本味与质感对比。
dish_arrangement:
  plate: 哑光白色陶瓷宽边盘，圆形，直径约24cm，中央浅凹形成自然容器，边沿微翘
  logic: 中心对称构图，运用垂直元素（立起的鱼肉）打破水平面的单调，形成视觉锚点；视线从盘边留白自然流向中心金黄色区域，最终聚焦于粉白色的鱼肉主体，形成由外至内的视觉流动
  spacing: 鱼肉与盘壁保持5-6cm的呼吸距离，酱汁占据盘面中心约35%面积呈圆形分布，鱼肉与酱汁接触点精准控制在几何中心，形成稳定的三角形支撑视觉效果
  decoration: 遵循'少即是多'的装饰法则，仅使用微量金黄色碎屑（柠檬皮或香草）点缀于鱼肉表面，数量控制在7-10点，呈随机分布但保持视觉平衡，既增添色彩层次又不破坏极简美感
  negative_space: 盘边四周保留约70%的负空间，形成天然画框效果；纯白色盘面与中心暖黄色块形成强烈色彩对比，突出主体同时赋予菜品呼吸感，符合现代fine
    dining的留白美学
  overall_style: 北欧新料理（New Nordic）与日式板前料理的融合风格，对标Noma或Osteria Francescana的精致Bistro定位，强调食材本真、技术精准与视觉纯净，适合现代简约餐厅或
    Chef's Table 场景
