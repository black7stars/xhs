filename: 青涧玉贝_001.jpg
path: 素材库/图片素材库/海鲜类/
primary_ingredient: 海鲜类
dish_type: 前菜
cuisine_style: 融合料理
main_colors:
- 乳白透明
- 青苹果绿
- 焦糖金
- 墨黑点缀
composition: 45度斜俯拍
food_presentation_style: 极简主义中心构图，北欧日式融合风格，强调食材本味与留白美学
season: 春/夏
lighting: 自然侧光
content_description: 选用新鲜扇贝薄切呈现半透明质感，中央点缀青苹果雪芭形成色彩与温度对比，周围环绕莳萝、香菜嫩芽及坚果碎增加层次，底部以香草油或墨鱼汁勾勒，整体如清泉中的玉石般清透，展现海洋的鲜甜与果园的清爽。
dish_arrangement:
  plate: 粗陶质感宽边浅碗（炻器材质），直径约24cm，不规则手工边缘，米白底色带灰蓝斑点，日式侘寂风格
  logic: 中心辐射构图，以雪芭为视觉焦点形成三角形稳定结构，扇贝片呈花瓣状环绕，视线由中心向四周渐变扩散，符合斐波那契螺旋法则
  spacing: 食材集中于碗底中心仅占盘面30%，外围70%留白形成呼吸感，食材间距保持3-5mm不重叠，确保每片扇贝独立可视
  decoration: 微观装饰法则：莳萝3-5支呈放射状插入，香菜嫩芽7-9片不对称分布，坚果碎2-3处簇状点缀，深色酱汁以点状随机分布（约15-20点）形成星空效果
  negative_space: 宽边碗沿形成环形留白，强化中心食材的珍贵感；黑色背景与白色盘面形成极端对比，留白比例控制在60%，营造东方禅意与西式精致的平衡
  overall_style: 新北欧Bistro风格，对标Noma/Relæ等米其林餐厅，适合高端休闲餐饮场景，强调食材透明度与手工质感，呈现'可食用的自然风景'概念
