season: 全年
lighting: 自然光
content_description: 精选蓝鳍金枪鱼刺身薄片以同心圆层叠方式包裹，外层覆以脆薄海苔定型，中心填入新鲜细切香葱，切片横截面呈现完美的几何图案。鱼肉脂纹清晰，赤红与雪白交织，翠绿葱芯点缀其间，置于粗陶长板之上，呈现日法融合料理的精致与克制。
dish_arrangement:
  plate: 长方形粗陶板，手工柴烧质感，土黄色渐变至棕褐色，表面呈现自然窑变火痕与斑驳肌理，尺寸修长（约35cm×12cm），边沿微翘呈不规则自然形态
  logic: 中心对称构图结合对角线摆放法则，圆形菜品置于陶板横向黄金分割点（偏左1/3处），利用陶板的长线条引导视觉流向，形成动静平衡
  spacing: 菜品占据陶板中心区域，四周保留充足呼吸空间，食材与器皿边缘保持至少3cm间距，避免拥挤感
  decoration: 零装饰法则（Less is More），完全依靠食材本身的色彩层次（墨黑海苔-绯红鱼肉-翠绿葱芯）和陶板质感构成视觉装饰，突出食材本真之美
  negative_space: 陶板右侧及下方保留大面积负空间，占比约65%，营造静谧禅意氛围，强化主体存在感，符合日式'间'（Ma）的美学概念
  overall_style: 侘寂美学（Wabi-Sabi）与现代极简主义融合，对标东京高端Bistro或Omakase板前料理，适合静谧的晚餐场景或品鉴菜单中的清口前菜环节
