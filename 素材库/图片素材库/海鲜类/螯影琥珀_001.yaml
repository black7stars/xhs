content_description: 精选挪威螯虾低温慢煮至半透明粉橘色，去壳后置于异形白瓷盘左侧，搭配表面切有菱形花刀的炭烤菌菇与腌渍柠檬片。虾头壳经高温油炸定型作为天然容器，盛入以虾脑、黄油熬制的琥珀色浓酱，点缀黑松露油。上下双盘垂直呼应，构建从海洋鲜甜到大地炭香的味觉层次。
dish_arrangement:
  plate: 上盘选用哑光白瓷波浪边异形盘（直径26cm，不规则边沿营造流动感），下盘搭配长方形白瓷 sauce boat（长10cm×宽5cm），材质均为粗陶质感哑光白，形成高低错落的空间剧场
  logic: 采用'天地线'构图法则：上盘遵循黄金分割，螯虾置于左1/3处，烤菌菇置于右下1/3处形成对角线平衡；下盘垂直居中于画面下方1/4处作为视觉锚点，引导视线由上至下自然流动，完成从主食材到酱汁的叙事闭环
  spacing: 上盘食材间距严格控制在2.5cm，营造呼吸感；上下两盘垂直间距约10cm，利用灰色背景作为视觉缓冲带，避免元素拥挤
  decoration: 遵循'食材即装饰'的极简法则，仅使用虾壳、菌菇片、柠檬片等食材本体进行装饰，零额外香草或酱汁点缀；黑色松露油点以等距排列形成节奏感，与上方烤物的焦褐纹理形成色彩呼应
  negative_space: 上盘留白比例高达75%，集中于右侧及上部区域，突出螯虾的雕塑感与孤独美学；灰色水泥质感背景与纯白餐盘形成中性画布，让食材成为绝对焦点，符合新北欧'空寂'审美
  overall_style: 新北欧Fine Dining风格，对标Noma、Aska等米其林餐厅的前菜呈现，强调可持续餐饮理念（虾壳再利用）与食材本真表达，适合高端Bistro的Tasting
    Menu场景，营造冷静、精致、带有艺术装置感的用餐体验
