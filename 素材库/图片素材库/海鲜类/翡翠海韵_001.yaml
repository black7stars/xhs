food_presentation_style: 家庭式分享碗装，色彩饱和的随意精致风格，食材悬浮于透亮酱汁中
season: 夏
lighting: 自然光
content_description: 新鲜海虾与鱿鱼浸润于翠绿青柠香菜酱汁中，点缀牛油果片、水萝卜薄片、紫洋葱丝及青辣椒圈，表面撒上红辣椒碎提色增香。酸爽辛辣的味觉层次与鲜明的色彩对比，呈现出极具夏日活力的拉丁美洲风味开胃菜。
dish_arrangement:
  plate: 粗陶浅碗（米色釉面），宽口浅底设计（直径约22cm），保留手工质感边缘，适合盛装带汤汁的冷腌海鲜
  logic: 中心放射状均匀散布法则，海鲜与蔬菜配料以不规则但均衡的方式漂浮于酱汁表面，形成从上至下的色彩层次（红-绿-白）
  spacing: 食材间保持0.5-1cm间隙控制，确保翠绿酱汁作为视觉底色充分可见，形成'星点散布'效果
  decoration: 功能性装饰为主——水萝卜片（8-10片）与辣椒圈（6-8片）既是配料也是色彩装饰，点缀香菜叶（3-4处），撒红辣椒碎形成视觉跳跃点
  negative_space: 碗沿保留1.5cm环形留白，背景桌面散落青柠角、萝卜片与辣椒碎，营造'刚刚端上'的场景叙事感
  overall_style: 现代都市Bistro风格，将街头墨西哥风味精致化，对标Casual Fine Dining的分享式前菜，适合夏日晚间露台佐酒场景
