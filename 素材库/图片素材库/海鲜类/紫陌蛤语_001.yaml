food_presentation_style: 侘寂自然主义，强调原始质感与季节性
season: 春
lighting: 自然光
content_description: 精选鲜蛤以半开形式呈现，肉质饱满浸润在清亮汤汁中，点缀以金黄色可食用花与嫩绿香草，搭配干薰衣草枝营造自然野趣。闭合蛤壳堆叠其间，形成开合对比。整体摆盘于粗陶碗中，展现侘寂美学与海洋鲜味的融合。
dish_arrangement:
  plate: 粗陶浅碗，手作质感，哑光米灰釉面，直径约16cm，边沿微卷不规则
  logic: 中心放射三角构图，三只开口蛤呈品字形分布于碗缘前方，闭合蛤壳堆叠于中心偏后形成高度层次，干花从后侧垂直向上延伸构成背景层次，视觉流动从中心向四周呈螺旋扩散
  spacing: 开口蛤间距约2.5cm形成独立展示单元，闭合蛤壳紧密堆叠营造体积感，食材与碗壁保留1cm呼吸空间
  decoration: 可食用花精准投放（每蛤1朵黄色主花+2-3朵白色碎花+细叶香草），干薰衣草枝8-10枝从碗后插出，高度为碗的2倍，形成自然背景幕布；遵循'三三制'装饰法则，色彩焦点集中于蛤肉中心
  negative_space: 碗外四周大面积留白（占画面75%），灰色水泥背景形成极简画布；碗内闭合蛤壳与开口蛤之间保留适度空隙，避免拥挤，突出主食材的精致感与悬浮感
  overall_style: 北欧新自然主义融合日式侘寂美学，对标Noma/Amass风格现代Bistro，适合午市轻食或晚餐tasting menu第一道，强调从农场到餐桌理念，营造宁静、质朴而精致的用餐氛围
