content_description: 香煎海鲈鱼柳皮脆肉嫩，呈横向置于盘心，下方铺垫丝滑土豆泥，搭配煎烤西兰花苔增添绿意。主厨正以勺淋下乳白黄油酱汁，酱汁悬垂成线，在鱼皮与蔬菜间形成流动的光泽层次，整体呈现精致Bistro的
  Casual Elegance 风格。
dish_arrangement:
  plate: 白色陶瓷浅平盘，哑光质感，宽边沿设计，直径约28-30cm，突出食材色彩对比
  logic: 横向主轴构图，鱼肉水平放置占据视觉中心，蔬菜纵向穿插形成十字交叉韵律，酱汁浇淋点位于画面黄金分割处，引导视线从动态酱汁流向主食材
  spacing: 鱼肉与配菜紧密相依但不重叠，保留3-5mm呼吸间隙；食材距离盘边保持2-3cm留白，营造舒展感
  decoration: 零添加装饰物原则，仅以食材本身为装饰——翠绿西兰花苔作为色彩焦点，海盐颗粒点缀鱼皮增加质感细节，酱汁作为唯一动态装饰元素
  negative_space: 盘面四周均匀留白，尤其上下两侧留白占比40%，突出中心食材的悬浮感；酱汁落点处的空白区域强化视觉焦点，符合高端餐饮的呼吸美学
  overall_style: 现代欧式Bistro风格，对标伦敦/巴黎精品小酒馆，适合Casual Fine Dining场景，平衡了精致料理的仪式感与轻松氛围
