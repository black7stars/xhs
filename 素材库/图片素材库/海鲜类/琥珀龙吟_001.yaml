content_description: 琥珀色浓郁龙虾高汤正缓缓注入白瓷深碗，鲜甜龙虾钳与手工饺子构成视觉焦点，金黄意面与翠绿豌豆苗、嫩菠菜叶交织，点缀以细切青葱，呈现层次分明的海陆融合汤面美学。
dish_arrangement:
  plate: 白色哑光陶瓷深碗，圆形宽口，直径约22cm，边沿微翘利于汤汁聚拢
  logic: 中心放射构图，龙虾钳作为绝对视觉焦点置于碗心，饺子与面条呈半月形环绕分布，引导视线从中心向四周自然流动
  spacing: 食材紧凑堆叠于碗心区域，距碗壁保留2-3cm呼吸空间，汤汁占据碗体60%高度，形成饱满而不溢出的视觉平衡
  decoration: 微型豌豆苗自然垂落于右侧形成垂直线条，细切葱花以线性方式点缀于左侧饺子表面，搭配几片新鲜菠菜叶，整体装饰控制在3-4个元素，避免喧宾夺主
  negative_space: 碗壁四周形成环形留白，与中央丰富食材形成虚实对比；暖色调木质桌面作为背景留白占比约35%，突出主体同时营造温馨质朴的Bistro氛围
  overall_style: 现代都市Bistro风格，对标高端休闲餐饮，适合周末Brunch或轻正餐场景，强调手工质感与东西方食材的碰撞融合
