content_description: 新鲜龙虾尾置于贝壳之上，肉质晶莹剔透呈粉白色，表面点缀香草奶油酱汁与翠绿葱油。配以烤至焦糖化的根茎蔬菜，表面切割菱形纹路增添质感。画面捕捉手部正用脆片倾注酱汁的瞬间，呈现料理的仪式感与温度，整体风格简约而富有张力。
dish_arrangement:
  plate: 白色哑光陶瓷盘，左侧波浪形艺术边沿设计，浅盘结构，直径约28cm，边沿微翘形成优雅曲线
  logic: 对角线构图法则，从左上角的烤根茎蔬菜向右下方的龙虾尾形成视觉引导线；手部动作位于右上黄金分割点，增加动态平衡与叙事性
  spacing: 宽松留白策略，主食材仅占盘面35-40%，食材间保持3-5cm间距，营造高端餐饮特有的呼吸感与珍贵感
  decoration: 极简装饰法则：仅使用2-3片烤葱段（焦糖化洋葱/韭葱）作为点缀，酱汁以线性流淌方式呈现，绿色香草油以细线点缀，装饰物总量控制在3种以内
  negative_space: 盘面右下及中央大面积留白（约60%），形成虚实对比，突出主食材的视觉焦点地位，同时给予酱汁流淌的空间想象力
  overall_style: 北欧极简主义融合现代法式Bistro风格，对标Noma/Alain Ducasse的精致 casual dining 理念，强调手工温度与食材本味，适合高端休闲餐厅主菜呈现
