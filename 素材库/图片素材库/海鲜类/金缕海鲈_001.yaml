content_description: 精选海鲈鱼柳以高温煎至表皮金黄酥脆，内里肉质保持雪白细嫩。顶部点缀手工炸制金丝脆片与新鲜微型香草，盘底环绕金黄柠檬黄油酱汁，盘缘以黑色香料粉末艺术点缀，呈现海陆交融的精致口感。
dish_arrangement:
  plate: 白色哑光陶瓷浅盘，圆形宽边设计，直径约24cm，微翘边沿形成自然画框
  logic: 对角线构图法则，鱼肉由左下向右上延伸形成视觉引导线，顶部垂直装饰打破平面感，形成Z字形视觉流动
  spacing: 中心聚焦式布局，主食材占据盘面黄金分割点，四周保留2-3cm呼吸边距，酱汁以不规则椭圆环绕食材底部
  decoration: 立体层次装饰法，3-4根交叉金丝脆片构建高度层次，2支细叶香草点缀增添生机，盘缘以点状黑色粉末（约12-15点）形成半包围框架，增强画面张力
  negative_space: 左右两侧及上方保留40%空白区域，深色背景与白色盘面形成强烈对比，留白处呼应食材的纯净质感，营造高端料理的空灵意境
  overall_style: 现代欧式Bistro精致料理风格，对标上海/东京米其林推荐餐厅，强调'少即是多'的美学理念，适合商务晚宴或纪念日场景，突出食材本味与烹饪技艺的纯粹表达
