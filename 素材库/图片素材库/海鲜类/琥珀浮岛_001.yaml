content_description: 低温慢煮或轻煎的白身鱼带皮直立插置于金黄色细腻泡沫之上，鱼肉呈粉白半透明质感，鱼皮焦褐酥脆。泡沫质地轻盈绵密，可能为藏红花、玉米或南瓜基底。摆盘采用极简主义风格，白色宽边盘大面积留白，仅以食材本身的色彩对比与质感层次构建视觉焦点，呈现现代融合料理的精致与克制。
dish_arrangement:
  plate: 哑光白瓷宽边深盘，圆形，直径约24cm，中心凹陷设计，边沿平缓外扩，材质温润无反光
  logic: 采用'孤岛式'构图法则，以金黄色泡沫为'海面'，直立鱼肉为'岛屿'，垂直元素打破水平面的单调，形成强烈的视觉锚点，视线由外向内自然汇聚
  spacing: 鱼肉与盘壁保持约3-4cm的呼吸间距，泡沫填充中心凹陷区域形成圆形边界，与纯白盘边形成清晰的分割线
  decoration: 零装饰法则，摒弃传统香草或花瓣点缀，仅依靠食材三色对比（金黄/粉白/焦褐）和质感差异（泡沫的绵密/鱼肉的紧实）作为视觉元素，顶部微量黄色碎屑（可能为柠檬皮或香料油）作为味觉暗示
  negative_space: 约75%的盘面为纯白留白，分布于外围宽边区域，营造'空'的意境与呼吸感，突出中心食材的珍贵性，符合高端餐饮的减法美学与东方留白艺术
  overall_style: 新北欧料理风格融合日式侘寂美学，对标Noma或Osteria Francescana等米其林餐厅的呈现逻辑，强调食材本真与地域感，适合现代Fine
    Dining Bistro的精致用餐场景
