- 雪白
- 翠绿
- 墨黑
- 绯红
composition: 45度斜俯拍
food_presentation_style: 极简主义现代摆盘，偏心构图，大量留白
season: 春
lighting: 自然光
content_description: 精选鲜鱿鱼切薄片卷成优雅花状，顶部点缀绯红色伊比利亚火腿丝，配以春季时令蚕豆，佐以浓郁黑蒜酱或墨鱼汁，底部点缀翠绿香草油，口感清爽却层次丰富，呈现山海交融的春日清新意境。
dish_arrangement:
  plate: 纯白色哑光陶瓷圆盘，极简北欧风格，宽边沿设计，直径约28cm，突出食材色彩对比
  logic: 采用偏心构图法则，主食材置于盘面左上方黄金分割点形成视觉重心；通过绿色酱汁的流动线条引导视线向右下方延伸，黑色酱料作为视觉锚点稳定构图，形成从左至右、由浅入深的视觉流动方向
  spacing: 食材集中占据盘面约35%区域，主食材（鱿鱼卷）与配菜（蚕豆）紧密相邻但层次分明，间距控制在0.5-1cm，既保持整体性又避免拥挤
  decoration: 减法装饰美学，仅用3-4条纤细火腿丝作为线性装饰增加高度维度，黑色酱料以不规则球状点缀形成色彩对比焦点，绿色酱汁以抽象涂抹方式增加流动感与生机
  negative_space: 右侧及下方约65%盘面留白，形成强烈的'呼吸感'与极简美学，突出食材的珍贵感与精致度，营造高端餐饮的空灵意境与想象空间
  overall_style: 新北欧风格融合日式极简主义，对标Noma或Osteria Francescana等米其林餐厅的现代精致料理，强调食材本真与季节感，适合高端Bistro的春季
