content_description: 整条红鲷鱼经精心去骨处理，鱼身切花刀后煎至金黄酥脆，立于琥珀色藏红花奶油酱汁之中。点缀以烤甜椒丁、水瓜榴及新鲜莳萝，色彩明快。鱼尾傲然挺立，呈现动态美感，体现现代Bistro对海鲜料理的精致诠释。
dish_arrangement:
  plate: 白色哑光陶瓷圆盘，宽边浅底设计，直径约26cm，边沿微翘形成自然画框效果
  logic: 垂直轴向构图，鱼尾朝上形成视觉锚点，鱼身纵向贯穿盘面形成中轴线；酱汁以圆形基底托举主食材，配菜沿鱼身两侧对称分布，形成稳定的三角视觉流动
  spacing: 鱼身与盘壁保持2.5cm呼吸间距，酱汁覆盖盘底2/3区域形成色块对比，装饰物呈散点式分布，间距控制在1.5-2cm避免拥挤
  decoration: 点缀法则，水瓜榴4颗、红椒丁4块、莳萝2枝，沿鱼身两侧非对称分布；绿色香草打破暖色单调，水瓜榴提供质感对比，数量控制在奇数点形成节奏
  negative_space: 盘边1/3环形留白，白色边沿与橙黄酱汁形成强烈色彩对比，突出中心食材的立体感；顶部鱼尾区域留白引导视线向上延伸，营造灵动气息
  overall_style: 现代简约新法式风格，对标Septime、Le Grand Restaurant等巴黎Bistro，适合高端商务午宴或精致晚餐场景，强调食材本味与视觉戏剧性的平衡
