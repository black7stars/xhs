food_presentation_style: 极简自然主义，以天然贝壳为盛器，强调海洋原生美感与现代料理的精致度结合
season: 春/夏
lighting: 暖光
content_description: 菜品以天然扇贝壳为盛器，内衬丝滑奶油基底，覆盖一层晶莹剔透的翠绿香草凝胶，顶部点缀微型蕨类香草与金黄色脆炸洋葱丝，置于粗陶圆盘之上，通过材质对比与色彩碰撞，呈现海洋与大地的美学对话。
dish_arrangement:
  plate: 粗陶材质圆形浅盘，直径约20cm，边沿微卷，土褐色哑光釉面，质感温润质朴
  logic: 中心对称构图，利用扇贝壳天然放射状纹路构建向心式视觉引导，焦点集中于中央翠绿凝胶，形成从外向内螺旋式视觉流动
  spacing: 扇贝壳居中偏上放置，与陶盘边缘保持2-3cm均匀间距，确保呼吸感；贝壳内部食材紧凑堆叠，突出立体感
  decoration: 极简点缀法则，顶部装饰3支微型蕨类香草呈三角分布，搭配2-3条棕色脆片交错摆放，数量控制在5-7个元素，增加纵向层次而不显杂乱
  negative_space: 陶盘大面积留白占比约70%，黑色背景衬托突出主体；扇贝壳内部白色奶油基底与绿色凝胶形成色彩留白，增强视觉焦点集中度
  overall_style: 北欧新派料理融合日式侘寂美学，对标Noma或Geranium风格，强调自然元素与精致技法的平衡，适合高端Bistro或Fine Dining场景
