content_description: 以墨鱼汁黑芝麻贝果为基底，层层叠放牛油果泥、流心水波蛋与烟熏三文鱼，顶部点缀红色鱼子酱与食用三色堇。盘侧搭配芝麻菜、樱桃番茄、红洋葱与菲达奶酪碎组成的混合沙拉，石榴籽散落其间增添色彩跳跃感。
dish_arrangement:
