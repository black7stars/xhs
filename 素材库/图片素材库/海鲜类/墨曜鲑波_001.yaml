  logic: 中心偏右构图，主菜垂直堆叠形成视觉焦点，沙拉向左侧自然延伸形成对角线平衡，引导视线从顶部装饰向底部层次流动
  spacing: 主菜与盘边保持2-3cm安全距离，三明治各层间保留0.5-1cm错位以展示截面，沙拉与主菜间距1.5cm避免混杂
  decoration: 顶部中心点缀红色鱼子酱与单朵食用三色堇形成视觉锚点，盘周散落5-6颗石榴籽与菲达奶酪碎，底部樱桃番茄切片增加色彩层次，共8-10处精致点缀
  negative_space: 右侧与下方保留35%留白，营造呼吸感与高端餐饮的克制美学，突出主食材的丰盛感
