content_description: 香煎海鲈鱼皮脆肉嫩，搭配鲜甜扇贝与酥脆金丝，置于纯白宽盘中央，琥珀色味噌黄油汁缓缓浇淋，银白、金黄与暖橙交织，点缀青葱细丝，呈现东西方融合的现代海鲜料理美学。
dish_arrangement:
  plate: 纯白哑光陶瓷宽边盘，圆形，直径约28cm，边沿微翘形成柔和弧度，材质温润
  logic: 中心聚焦构图，视觉流向从左上浇汁动作引导至食材主体，形成动态平衡；食材层叠营造垂直高度，金丝顶部聚焦视线
  spacing: 食材集中占据盘面约35%，各组件间距控制在0.5-1cm，保持紧密关联性，酱汁自然晕染形成过渡
  decoration: 极简装饰法则，仅用炸姜丝（金缕）作为顶部纹理装饰，搭配两枚青葱嫩芽呈对角线点缀，数量控制在3点以内，避免过度装饰
  negative_space: 大面积白色留白位于食材右侧与前方，占比约65%，形成呼吸感，突出主体精致感并引导视觉集中于浇汁瞬间
  overall_style: 现代北欧融合日式Bistro风格，对标Osteria Francescana或Noma的简约美学，强调食材本真与手工温度，适合高端休闲晚餐场景
