content_description: 一只完整的红魔虾横卧于翠绿色泡沫之上，虾身呈对角线构图，表面点缀三朵淡紫色食用花卉。泡沫质地细腻绵密，色泽如春日嫩草，与虾的橙红色形成强烈视觉对比，置于纹理白盘中央，呈现极简主义的现代料理美学。
dish_arrangement:
  plate: 哑光白瓷盘，圆形宽边浅底，外缘布满规则凸点纹理，直径约24cm，边沿宽度占盘面40%，材质温润
  logic: 中心聚焦与对角线构图结合，虾身自左上至右下贯穿绿色泡沫区域，形成动态视觉流动线，三朵花卉沿虾身曲线分布强化引导感
  spacing: 食材集中占据盘面中央30%区域呈'岛式'布局，虾身与盘边保持均匀留白距离，泡沫圆形铺底与盘形呼应
  decoration: 三朵紫色五瓣食用花卉（疑似韭菜花），沿虾身头中尾三点分布，遵循奇数法则形成节奏感，色彩互补提亮点缀
  negative_space: 盘面70%为纯白环形留白，包围中心色块形成画廊展示效果，突出食材色彩与质感，营造高级呼吸感
  overall_style: 新北欧极简主义Bistro风格，对标现代米其林餐厅春季菜单，强调自然色彩与原始形态，适合Fine Dining场景
