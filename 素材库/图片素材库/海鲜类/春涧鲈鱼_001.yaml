content_description: 精选鲈鱼经香煎或清蒸后横卧于翠绿色香草汤汁之中，鱼腹内填入细碎的香草馅料，盘周环绕春季嫩竹笋段，顶部以新鲜豌豆苗或微型芽菜点缀，呈现春日山涧般的清新意境，鱼肉银白与汤汁碧绿形成鲜明对比。
dish_arrangement:
  plate: 白色陶瓷深盘（汤盘），圆形，宽边设计，直径约26-28cm，哑光质感
  logic: 中心对称构图，鱼身横向放置作为视觉主轴，汤汁形成绿色基底，竹笋呈放射状分布于鱼身两侧，引导视线向中心汇聚
  spacing: 鱼身占据盘面中心60%区域，四周保留均匀汤汁间距，顶部装饰物高出鱼身2-3cm形成纵向层次
  decoration: 新鲜豌豆苗（或苜蓿芽）置于鱼背中央，数量控制在3-5根，呈自然散落状，既增加色彩对比又暗示春季时令
  negative_space: 白色盘沿形成环形留白，占比约25%，突出中心菜品的色彩冲击力，同时双手端盘的动作增强场景感与温度感
  overall_style: 高端Bistro春季限定主菜，对标现代中式融合料理（如New Chinese Cuisine），适合春季菜单或时令特供，强调自然、清新、健康的饮食理念
