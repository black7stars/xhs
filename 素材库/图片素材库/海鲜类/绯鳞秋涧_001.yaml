content_description: 精选白身鱼经甜菜根汁浸润呈现绯红纹理，表面淋以金黄藏红花荷兰酱形成流动线条，搭配焦糖化烤菊苣，置于绵密花椰菜泡沫之上，盛于手作粗陶深碗中，呈现质朴而精致的现代Bistro美学。
dish_arrangement:
  plate: 手作粗陶深碗，螺旋纹理，灰白混色釉料，直径约18cm，高边沿设计营造包裹感与私密性
  logic: 不对称黄金分割构图，主料偏左下置于视觉重心，烤蔬菜居右上形成对角线平衡，酱汁由左上向右下流动引导视线轨迹
  spacing: 主料与碗壁保持1.5-2cm安全间距，泡沫占据碗底1/2面积形成悬浮基底，食材堆叠高度控制在3cm内确保食用便利性
  decoration: 极简主义装饰法则，仅以一枚炭烤菊苣作为配菜点缀，表面酱汁以不规则条纹装饰形成抽象艺术感，无额外香草或花瓣
  negative_space: 碗体右上1/3区域完全留白，与左下密集区形成虚实对比，增强呼吸感与高级感，突出食物主体地位
  overall_style: 新北欧Bistro风格，对标Noma/Relæ系餐厅，强调大地色系与手工质感，适合秋冬晚间正餐场景，营造温暖而精致的用餐体验
