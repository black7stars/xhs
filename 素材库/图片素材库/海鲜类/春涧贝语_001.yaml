food_presentation_style: 自然主义侘寂风，粗陶质感与鲜活花草对比，营造春日海岸原生的高级感
season: 春
lighting: 自然光
content_description: 精选新鲜鸟蛤以半壳为盏，盛载嫩滑贝肉与香草油醋汁，点缀明黄色食用花与微型香草，置于手工粗陶碗中。背景辅以雾紫色薰衣草枝条，整体呈现春日海岸的清新与生机，口感清鲜爽脆，充满海洋气息。
dish_arrangement:
  plate: 粗陶浅碗，大地色系米灰调，手工质感不规则边缘，中等尺寸（约18cm直径），无边沿设计突出食材本身
  logic: 中心堆叠构图，三枚开口贝壳呈品字形（120度角）分布形成视觉稳定三角，闭合贝壳作为基底营造自然堆叠层次，薰衣草从后方斜向延伸形成纵向线条，引导视线由花至壳再至桌面
  spacing: 贝壳紧密相叠营造丰盛感，开口贝壳间距均等约2cm避免拥挤，贝壳与碗壁保留1cm呼吸缝，背景薰衣草与碗口保持3cm距离形成景深层次
  decoration: 黄色伞形食用花（3-4朵/壳）作为视觉焦点，白色小花与绿色香草油滴点缀其间，后方薰衣草干花（5-7枝）作为背景氛围装饰，遵循「3-5-7」奇数法则与「少即是多」原则，装饰物不遮盖食材本色
  negative_space: 四周大面积水泥灰背景留白占比约65%，碗体居中偏下位置，顶部留白延伸至薰衣草，营造静谧呼吸感与画廊式展示效果，突出菜品的艺术品属性
  overall_style: 北欧极简美学与日式侘寂风融合，对标Noma/Septime等现代Bistro风格，强调食材本真与季节感，适合高端休闲餐厅春季限定菜单，营造「野生而精致」的用餐体验
