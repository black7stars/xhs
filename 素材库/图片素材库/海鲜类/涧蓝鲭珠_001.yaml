- 普鲁士蓝
- 银灰色
- 宝石红
composition: 45度斜俯拍
food_presentation_style: 北欧极简主义与日式侘寂美学结合，中央聚焦式摆盘
season: 全年
lighting: 自然光
content_description: 银皮鲭鱼卷成圆柱置于米布丁基底之上，顶部点缀深黑鲟鱼子酱，周围散落红宝石般石榴籽与粉红腌萝卜球，佐以酸模叶片点缀。深蓝花岗岩纹理餐盘模拟深海意境，食材如珍宝般镶嵌其中，呈现海洋与陆地的味觉对话。
dish_arrangement:
  plate: 粗陶质地深盘，仿青金石纹理，圆形宽边设计，直径约22cm，边沿高2.5cm形成自然画框效果
  logic: 中心放射构图法则，以黑色鱼子酱为视觉锚点，鱼肉卷形成次级同心圆，红色点缀呈不规则三角分布引导视线流动，营造'深海探珠'的叙事感
  spacing: 食材集中于盘面中心30%区域，彼此保持0.5-1cm呼吸间距，避免堆砌感；蛋白与淀粉基底自然晕染过渡
  decoration: 少即是多原则：3片酸模叶呈不对称分布（2片托底、1片斜插），5颗石榴籽与2颗腌萝卜球形成色彩节奏，点缀物数量控制在10件以内确保高级感
  negative_space: 盘面70%区域保留完整蓝色肌理，形成'深海留白'；食材与盘边保持3cm以上安全距离，强化孤岛式视觉焦点，赋予食材'海中珍宝'的象征意味
  overall_style: 当代北欧Bistro风格，对标Noma/Relæ等哥本哈根餐厅美学，适合白色大理石台面或深色原木餐桌场景，强调食材本真与手工质感
