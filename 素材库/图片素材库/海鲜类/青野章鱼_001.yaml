content_description: 精选章鱼腿经低温慢煮后炭烤，表面呈现诱人焦糖色与烤痕，置于绵密青豆泡沫之上。翠绿酱汁以流体艺术形态自然流淌，点缀新鲜豌豆苗与金黄色香草油，形成鲜明的色彩对比与层次质感，诠释现代融合料理的精致美学。
dish_arrangement:
  plate: 白色哑光陶瓷圆盘，宽边浅底设计，边沿微翘，直径约24cm
  logic: 中心放射式构图，以章鱼腿为视觉焦点呈对角线延伸，酱汁由中心向四周自然流淌形成动态线条，引导视线向外扩散
  spacing: 食材主体占据盘面中央25-30%区域，酱汁覆盖中圈40%范围，外围保留30%以上纯净留白，层次分明
  decoration: 新鲜豌豆苗与细叶香草3-4支，随意穿插于章鱼表面，高度提升2-3cm，形成立体层次与色彩呼应，数量精简避免繁复
  negative_space: 盘面外圈50%区域保留完整白色留白，位于12点至6点钟方向，占比超半数，强化视觉焦点与高级感
  overall_style: 现代北欧Bistro风格，对标Osteria Francescana等现代意式餐厅，适用于 casual fine dining
    晚餐场景，强调自然色彩与极简美学
