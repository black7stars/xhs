food_presentation_style: 自然主义侘寂美学，强调食材本真形态与季节性野趣，粗陶与精致食材的质感对比
season: 春
lighting: 自然光
content_description: 精选新鲜蛤蜊以半开壳形式呈现，肉质饱满浸润于清透香草油中，点缀以金黄花蕊与洁白碎花，置于粗陶器皿内。背景搭配干燥薰衣草枝，营造自然野趣。整体色调温润雅致，展现春日海洋与陆地风物的诗意融合。
dish_arrangement:
  plate: 粗陶浅碗，米白色哑光釉面，手工质感圆形无沿设计，直径约16cm，厚度适中呈现温润厚重感
  logic: 中心放射状堆叠构图，三只开壳蛤蜊呈品字形分布于前景视觉焦点，闭合贝壳自然堆叠于中后景形成高度层次，干燥薰衣草纵向向上延伸打破水平圆形边界，形成立体空间感
  spacing: 紧凑式亲密布局，贝壳间保持0.5-1cm自然堆叠缝隙，形成有机整体；开壳蛤蜊间距约2cm，确保每只独立展示同时维持群组感
  decoration: 干燥薰衣草枝5-7支呈放射状从器皿后方自然插入，高度约12-15cm，形成天然背景屏风；可食用花卉精确点缀于每只贝肉中心（黄色花蕊3朵为主视觉锚点，白色碎花3-5朵为辅），绿色香草细丝穿插其中，形成点线面结合的精致细节
  negative_space: 背景采用大面积浅灰水泥质感台面，留白占比约65%，突出中央器皿主体；器皿内部闭合贝壳的粗糙外壳质感与开壳部分的精致内容形成虚实对比，营造呼吸感
  overall_style: 新派北欧融合风格，对标Noma/Amass等自然主义餐厅，适合高端Bistro春季 tasting menu，强调从海岸到餐桌（Sea-to-Table）理念与季节性食材的诗意表达，兼具侘寂美学与现代精致料理的冲突美感
