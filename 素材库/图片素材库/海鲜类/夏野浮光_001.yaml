content_description: 精选当季鲜美白身鱼切条，浸于清透柑橘汤汁之中，点缀以野生覆盆子、鲑鱼子及蓝莓，佐以金黄茴香花与嫩绿香草。手工粗陶碗盛装，色彩如夏日花园般绚烂，酸甜与鲜美交织，呈现北欧
  fusion 风格的野趣美学。
dish_arrangement:
  plate: 手工粗陶碗，浅口宽沿设计，米白色哑光釉面，直径约18cm，厚重复古质感，与精致食材形成材质对比
  logic: 中心放射构图，食材由碗心向四周自然散落，形成视觉焦点后呈螺旋状向外扩散，引导视线探索式流动
  spacing: 食材密集于碗底中心区域，约占底部面积40%，保留碗沿大面积留白，形成疏密有致的呼吸节奏
  decoration: 可食用花卉（茴香花）3-5朵分布于中心区域，三色浆果（红橙黑）错落点缀，香草细叶穿插其间，数量控制在12-15个装饰点，营造野趣而不凌乱
  negative_space: 碗沿环形留白占比约60%，形成宽阔的负空间带，突出中心食材的色彩张力，赋予菜品禅意与高级感
  overall_style: 北欧自然主义融合风格，对标Noma系Fine Dining，适合作为夏季tasting menu的开胃前菜，强调在地野生食材与极简主义美学的平衡
