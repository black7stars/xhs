filename: 琥珀秋鳞_001.png
path: 素材库/图片素材库/海鲜类/
primary_ingredient: 海鲜类
dish_type: 主菜
cuisine_style: 融合料理
main_colors:
- 琥珀金
- 象牙白
- 嫩芽绿
composition: 45度斜俯拍
food_presentation_style: 极简主义现代摆盘，垂直层叠构图，注重食材本体质感与留白呼吸感
season: 秋
lighting: 暖光
content_description: 精选海鱼段煎至表皮金黄酥脆，鱼肉层叠于焦糖藕片之上，形成高低错落的立体结构。顶部覆盖金丝脆片（疑似炸姜丝或柠檬皮丝），点缀两叶翠绿嫩芽。琥珀色酱汁于盘底自然晕染，与纯白瓷盘形成冷暖对比，呈现秋日温润而精致的视觉张力。
dish_arrangement:
  plate: 白色哑光陶瓷圆盘，浅凹设计，边缘微翘收边，直径约22-24cm，突出食材色彩对比
  logic: 偏心构图（偏右1/3处），垂直轴向层叠（底-藕片-鱼肉-金丝），视觉流动由底部酱汁环形引导向上聚焦至金丝顶点
  spacing: 食材主体占据盘面约35%，酱汁呈不规则椭圆环绕（距盘边3-4cm），主食材与酱汁间保持0.5cm呼吸间隙
  decoration: 金丝脆片（约3-4g）蓬松置顶形成3cm高度差，两片微型绿叶（萝卜苗或酸模叶）以45度角斜插于鱼肉左侧，打破纵向线条的单调
  negative_space: 盘面65%留白集中于左上及右下区域，形成L型负空间，突出中心食材的雕塑感，营造高端餐饮的克制美学
  overall_style: 现代北欧极简融合日式侘寂美学，对标Noma/Relae风格，适合人均300+高端Bistro秋季主菜，强调食材本真与手工质感
