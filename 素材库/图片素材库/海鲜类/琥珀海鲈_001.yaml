content_description: 精选海鲈鱼柳，表皮以扒板煎至琥珀色焦脆，内里肉质呈现象牙白细腻纹理。顶部堆叠金黄脆片（可能为炸洋葱或根茎类）与细叶香草，盘底环绕金黄色酱汁，边缘以黑色粉末点洒形成星空效果，整体呈现简约而精致的高级Bistro质感。
dish_arrangement:
  plate: 白色哑光陶瓷浅盘，圆形，宽边沿微翘，直径约26-28cm，材质细腻无反光
  logic: 采用对角线构图法则，鱼身从左下向右上延伸形成视觉引导线；垂直方向通过顶部脆片堆叠构建第三维度层次，营造动态平衡
  spacing: 主食材占据盘面约35-40%，与盘壁保持2.5-3cm安全边距，酱汁呈不规则椭圆环绕鱼肉底部，不触及盘沿
  decoration: 顶部装饰3-4片金黄脆片呈放射状交错，点缀2枝细叶香草（如细叶芹或百里香嫩芽）于最高点；盘边以黑色粉末（可能为墨鱼汁粉或活性炭）进行点状喷洒，形成'星空'艺术效果，数量控制在15-20个点
  negative_space: 盘面左上及右侧保留大面积留白，约占整体65%，形成强烈的视觉呼吸感，突出中心食材的精致感与高级餐厅的克制美学
  overall_style: 现代北欧Bistro风格，对标哥本哈根或斯德哥尔摩的米其林指南推荐餐厅，适合高端晚餐场景，强调食材本真、极简主义与光影质感
