content_description: 手工意式土豆团子裹满浓郁的香辣奶油番茄酱，搭配弹嫩鲜虾仁，表面点缀新鲜欧芹碎。粗陶碗盛装，酱汁丰盈流淌，叉子斜插形成视觉焦点，整体呈现温暖诱人的现代意式家庭料理氛围。
dish_arrangement:
  plate: 浅灰色粗陶碗，宽口浅底设计，边缘保留手工不规则纹理，哑光质感，直径约22cm
  logic: 中心聚焦式构图，叉子45度斜插形成视觉锚点，食材自然堆积呈放射状分布，引导视线由中心向四周流动
  spacing: 食材紧密排列无间隙，酱汁填充缝隙形成整体感，边缘保留1.5cm呼吸空间避免过度拥挤
  decoration: 新鲜欧芹碎均匀撒布，每平方厘米约2-3片，形成翠绿点缀与橙红酱汁的色彩对冲，提升清新感
  negative_space: 碗沿保留2-3cm灰白色边环，与深色酱汁形成明暗对比，突出主体同时营造手工器皿的质朴美感
  overall_style: 现代 Rustic Bistro 风格，对标 Lilia/Misi 等高端意式餐厅，适合 casual fine dining 场景，强调手工温度与食材本真的舒适美学
