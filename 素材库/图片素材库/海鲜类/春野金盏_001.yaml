- 墨绿
- 粉白
- 明黄
composition: 45度斜俯拍
food_presentation_style: 日式极简与北欧清新结合，强调食材本真质感
season: 春
lighting: 自然光
content_description: 墨绿色海苔脆杯呈花盏状错落排列于玄色瓷盘，内盛粉嫩金枪鱼丁，覆以丝滑乳白酱汁，顶部点缀明黄色可食用花卉与翠绿香草。整体构图疏密有致，色彩对比鲜明，呈现春日清新雅致之感，为典型的一口食精致前菜。
dish_arrangement:
  plate: 哑光黑色粗陶盘，圆形浅边，直径约22cm，无光泽质地凸显食物色彩
  logic: 采用不对称三角形构图，四个海苔杯沿左上至右下对角线分布，形成视觉流动引导，符合黄金分割比例
  spacing: 杯体间距控制在2.5-3cm，既保持独立美感又形成群组关系，避免拥挤或疏离
  decoration: 每杯顶部精准放置一朵明黄色可食用花（金莲花/油菜花）配两根细叶香草，共4组装饰形成节奏韵律，点缀色占比不超过15%
  negative_space: 右下侧保留约40%大面积留白，与左上密集区形成虚实对比，营造呼吸感并突出主体精致度
  overall_style: 现代融合Bistro风格，对标东京/上海精品小酒馆春季菜单，强调季节性、手工感与一口食的仪式感，适合配酒享用
