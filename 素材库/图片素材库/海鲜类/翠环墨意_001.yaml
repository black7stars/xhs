content_description: 墨鱼汁意面卷成鸟巢状居中摆放，顶部堆叠嫩白鱿鱼圈与鱿鱼须，点缀细叶香草；盘边环绕翠绿香草酱汁，形成鲜明色彩对比。整体呈现黑白绿三色美学，口感层次丰富，兼具海洋鲜甜与草本清香。
dish_arrangement:
  plate: 白色哑光陶瓷浅盘，圆形，直径约24cm，微翘边沿
  logic: 中心垂直堆叠构图，利用高度差营造立体感；绿色酱汁环形打底形成'画框效应'，引导视线向中心黑白对比区域聚焦，形成向心力
  spacing: 面条堆叠直径约8cm，与盘边保持2-3cm均匀间距；顶部食材蓬松紧凑但不溢出酱汁环范围
  decoration: 新鲜莳萝或细香葱3-4支，长度8-10cm，呈45度角不对称放射状插入，打破圆形单调，增加自然野趣与香气提示
  negative_space: 绿色酱汁外缘与盘边保留约1.5cm白色留白带，避免色彩溢出，平衡视觉重量，提升精致感
  overall_style: 当代意式Bistro融合北欧极简美学，强调食材本色与色彩对比，对标高端海鲜意面专门店，适合现代都市餐厅午餐场景
