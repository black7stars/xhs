composition: 平视
food_presentation_style: 开放式面包碗堆叠， rustic 质朴风格，强调食材层次与肌理对比
season: 全年
lighting: 自然光
content_description: 深棕色杂粮面包挖空成碗状，表面点缀燕麦与亚麻籽。内馅层次丰富：底部铺垫腌渍卷心菜，其上整齐排列橙红色小龙虾尾，搭配整颗烤香菇，顶部撒上橄榄碎与香草酱。面包的粗粝质感与海鲜的温润光泽形成对比，呈现精致而随性的Bistro美学。
dish_arrangement:
  plate: 复古做旧金属托盘（黄铜或镀银材质），长方形，低边沿设计，突出手作质朴感
  logic: 群聚式构图，前景两件为主焦点呈对角线排列，后景两件虚化营造景深，视觉流动由前向后引导，强调分享式用餐的亲密氛围
  spacing: 单品间保留1-2cm呼吸间距，既体现独立感又保持整体关联；内部馅料饱满堆叠，形成高低错落的立体层次
  decoration: 零添加装饰法则，完全依靠食材本色对比——橙红虾尾与深褐面包形成主视觉冲突，墨绿香草碎作为点缀色提鲜，蘑菇的哑光质感平衡画面
  negative_space: 背景高度虚化留白，托盘四周边缘保留适当负空间；面包碗内部充实与外部空盘形成虚实对比，突出主体的丰盈感
  overall_style: Rustic Chic（质朴精致风），对标伦敦/纽约现代Bistro，强调手作温度与食材本真，适合 casual dining 场景，营造随性却不失格调的用餐体验
