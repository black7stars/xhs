- 珍珠白
- 淡绯粉
- 石榴红
- 琥珀金
composition: 45度斜俯拍
food_presentation_style: 极简主义中心堆叠式摆盘，新日式融合风格
season: 秋
lighting: 自然光
content_description: 薄切白身鱼刺身以层叠方式优雅呈现，鱼肉呈现通透的淡粉色与珍珠白交织纹理，搭配腌制根芹或洋葱薄片，顶部点缀秋季石榴籽与黑色海苔脆丝，浸润于柚子柑橘系琥珀色酱汁中，口感清爽开胃，视觉纯净雅致。
dish_arrangement:
  plate: 纯白色哑光陶瓷盘，圆形浅盘，宽边沿设计（约28-30cm直径），无纹理干扰，最大化突出食材天然色彩
  logic: 中心放射构图法则，食材呈垂直层叠形态置于盘面黄金分割点，视线从顶部黑色脆丝装饰自然向下流动至酱汁基底，形成明确的视觉 hierarchy
  spacing: 食材占据盘面约15-20%面积，中心紧密堆叠营造立体感，周围保持开阔间距，食材层间保留细微间隙以利酱汁渗透
  decoration: 极简三元素法则：石榴籽2颗（对角线分布）+ 黑色海苔脆丝1簇（顶部中心）+ 微量绿色香草碎（散点），形成稳定的三角视觉锚点，色彩对比强烈但体量克制
  negative_space: 约80%盘面留白，均匀分布于食材四周及底部区域，营造高级感的呼吸空间，强化中心食材的珍贵感与仪式感
  overall_style: 现代北欧与日式Bistro融合风格，对标Osteria Francescana或Noma的精致前菜美学，强调食材本真与极简主义，适合高端Fine
    Dining或精品Bistro的秋季菜单
