content_description: 精选白身鱼或扇贝切薄片铺于盘心，搭配腌制红甜椒条呈放射状摆放，覆盖细腻柑橘泡沫酱汁，点缀金莲花瓣。深紫红色粗陶盘与鲜艳食材形成强烈对比，呈现清爽夏日风情。
dish_arrangement:
  plate: 粗陶材质（赤陶/紫砂质感），圆形宽边浅底，直径约24cm，边沿厚实带磨砂纹理
  logic: 中心放射构图，食材从盘心向外呈不规则星芒状延伸，视觉焦点集中于中央后自然向外流动，营造绽放动感
  spacing: 食材占据盘心35-40%区域，条状物之间保持0.5-1cm呼吸间隙，避免堆叠，泡沫填充空隙形成整体感
  decoration: 金莲花瓣（橙黄色）8-10片，不规则分布于红色甜椒间隙及海鲜表面，形成色彩跳色与立体层次，呼应夏日主题
  negative_space: 宽边盘沿形成大面积留白，占比约65%，深色粗陶质感营造静谧氛围，突出中央菜品精致感，符合Less is more的高级审美
  overall_style: 北欧极简与日式侘寂融合，对标Noma/Relæ风格，适合高端Bistro或Fine Dining场景，强调食材本味与手工器皿的温度感
