content_description: 手工粗陶宽边白盘中央，薄切扇贝片呈半透明状层叠铺陈，宛若花瓣围合。中心点缀青瓜雪葩呈橄榄形，四周淋洒翠绿香草油，撒布烤榛子碎与黑松露屑，点缀细叶莳萝与欧芹嫩芽，整体呈现清冽通透的春日海洋气息。
dish_arrangement:
  plate: 粗陶质地宽边深碗，米白色釉面夹杂灰褐色斑点，手工拉坯不规则边缘，直径约22cm，边沿宽度占整体半径2/3
  logic: 中心焦点构图法则，视觉重心落于碗底中央的绿色雪葩，白色扇贝片呈放射状向外延伸，形成向心式视觉流动
  spacing: 食材严格控制在碗底凹陷区域内，距离盘壁保持3-4cm间距，形成环形留白带
  decoration: 微量点缀法则，三种质感装饰（脆-坚果碎/嫩-香草叶/颗粒-松露碎）呈不对称三角分布，数量控制在5-7点，避免过度装饰
  negative_space: 宽边粗陶盘形成大面积米白色负空间，占比约70%，突出中心精致食材，营造日式'间'之美学
  overall_style: 新北欧极简主义，对标哥本哈根Relae/Osteria Francescana风格，适合现代Bistro的Fine Casual场景
