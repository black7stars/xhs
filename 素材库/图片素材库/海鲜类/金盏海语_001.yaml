composition: 俯拍
food_presentation_style: 线性韵律排列，极简现代主义
season: 春
lighting: 自然光
content_description: 墨绿色海苔脆片呈叶片状整齐排列，承托着细腻撕碎的金枪鱼肉，顶部点缀圆润乳白色酱汁球，配以明艳黄色食用小花与翠绿莳萝细叶。色彩对比鲜明，构图呈对角线韵律排列，呈现春日清新的高级感。
dish_arrangement:
  plate: 黑色长方形粗陶石质餐盘，哑光质感，边沿微翘，长条形设计（约35cm×20cm），深灰黑色调提供强烈色彩对比
  logic: 对角线韵律构图，七件式重复单元从左下至右上呈S型流动排列，形成视觉引导线；每个单元采用中心对称布局，独立成景又整体统一
  spacing: 单元间距严格控制在1.5cm保持呼吸感，食材距脆片边缘0.8cm内聚留白，整体占据盘面60%，与右上角空白形成疏密对比
  decoration: 顶点式装饰法则，每单元精准放置2朵黄色食用花（金莲花或油菜花）及1枝细叶莳萝，共14朵花7枝草，形成黄色视觉锚点，增加纵向层次与香气维度
  negative_space: 右上角40%区域刻意留白，黑色盘面作为负空间衬托食材色彩；左侧边缘保留2cm空边，平衡左下角密集排列的视觉重心，营造呼吸感
  overall_style: 现代日式融合Bistro风格，对标高端居酒屋或Fine Dining Casual，强调春季时令感与极简美学，适合作为春季品鉴菜单的开场小品
