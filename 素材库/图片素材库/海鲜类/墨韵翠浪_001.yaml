path: 素材库/图片素材库/海鲜类/
primary_ingredient: 海鲜类
dish_type: 主菜
cuisine_style: 融合料理
main_colors:
- 墨黑色
- 翠绿色
- 象牙白
- 香槟金
composition: 45度斜俯拍
food_presentation_style: 现代极简主义垂直堆叠，中心对称构图，酱汁环绕基底
season: 春/夏
lighting: 自然光
content_description: 墨鱼汁意面精心盘成圆柱形鸟巢状，矗立于翠绿香草酱汁之上，形成鲜明的色彩对比。顶部点缀着细嫩的鱿鱼丝与新鲜莳萝，在宽边金环白瓷盘中呈现出现代Bistro的精致美学，黑白绿三色交织出海洋与森林的清新意境。
dish_arrangement:
  plate: 宽边深底陶瓷盘，哑光白釉质地，内侧饰以香槟金色细环，直径约24-26cm，深盘设计用于承载酱汁与面条的立体堆叠
  logic: 中心对称构图配合垂直向心式堆叠，视线从盘边金环向内聚焦至面条顶端，形成由下而上（酱汁-面体-海鲜）的层次递进，符合黄金螺旋视觉动线
  spacing: 面条主体占据盘面中心约35%区域，酱汁外圈与盘壁保持2-3cm优雅间距，顶部装饰高度控制在3cm以内以维持精致比例，避免过度拥挤
  decoration: 采用'冠式点缀'法则，鱿鱼丝形成蓬松的白色体积感（约15-20条细丝的随意交错），穿插5-7支线性莳萝细叶呈放射状分布，既增加垂直高度又引入有机线条打破几何单调
  negative_space: 宽边盘沿形成大面积留白（约占视觉画面的65%），纯白色盘沿与金色环带构成'画框效应'，不仅突出中心菜品，更通过极简留白传递高端餐厅的克制美学与呼吸感
  overall_style: 新北欧极简主义融合现代意式Bistro风格，对标Attica或Noma的精致 casual dining 定位，强调食材本色、几何秩序与色彩对比，适合商务午餐或约会场景的精致呈现
