cuisine_style: 融合料理
main_colors:
- 米白
- 翠绿
- 赭石棕
- 乳白
composition: 45度斜俯拍
food_presentation_style: 极简自然主义，以贝壳为器，中心聚焦式摆盘
season: 春/夏
lighting: 暖光
content_description: 以天然扇贝壳为盛器，中央置翡翠色半透明球形主体（疑似腌渍蔬菜啫喱或香草油封扇贝），卧于乳白绵密的泥状基底之上。顶部点缀细叶山萝卜苗与焦糖色脆片（可能为炸洋葱或海苔），整体色彩清新如海洋，质感层次从脆到滑再到绵密，呈现现代融合料理的精致美学。
dish_arrangement:
  plate: 双层器皿设计：内层为天然扇贝壳（保留放射状褐白纹理，直径约12-14cm），外层为粗陶质感浅盘（陶土材质，哑光釉面，圆形，直径约22cm，低边沿），形成材质与色彩的自然过渡。
  logic: 中心对称构图配合向心式视觉引导。利用扇贝壳天然放射纹路将视线引向中心的翠绿球体，形成视觉锚点。双层器皿创造纵向层次（陶盘-贝壳-食材），增强空间立体感。
  spacing: 极简主义间距控制。主食材（绿色球体）居中，占据贝壳内部约30%空间，周围保留充足呼吸带。装饰物（香草3片+脆片3条）呈不对称三角分布，间距控制在1-1.5cm，精密而不拥挤。
  decoration: 微型点缀法则（Micro-garnish）。采用'三点平衡'原则：3片鲜绿细叶香草（山萝卜苗）提供色彩呼应与生机感，3条金棕色脆片增加纵向高度与质地对比。装饰物体积控制在0.5-1cm，仅作点睛不喧宾夺主。
  negative_space: 大面积留白策略。贝壳内部约60%区域为留白（米色/白色），突出中央绿色主体；外层陶盘与贝壳间形成环形留白带（占比约45%），营造静谧高级感。留白作用：强化主体视觉重量，赋予菜品'呼吸感'，符合高端Bistro的极简美学标准。
  overall_style: 北欧新料理（New Nordic）与现代法式Bistro融合风格，对标Noma、Geranium等米其林餐厅理念。强调'从自然到餐桌'，运用发酵/腌渍技法，以贝壳为器体现海洋叙事，适合高端休闲晚餐场景，彰显主厨对食材本味与视觉诗意的双重追求。
